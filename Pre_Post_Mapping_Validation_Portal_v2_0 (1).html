<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimInformatics™ — Pre & Post Mapping Validation Portal v2.0</title>
    <!-- v2.0 | 2026-03-16 | Renamed to Pre & Post Mapping Validation Portal; dead code removal; performance refactor; dark mode removed per CI policy -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           CSS VARIABLES — ClaimInformatics Brand System
           ============================================================ */
        :root {
            --primary: #77256C;
            --primary-dark: #5a1d52;
            --primary-light: #945F8D;
            --primary-faint: rgba(119, 37, 108, 0.06);
            --accent: #FBB75E;
            --accent-dark: #e9a045;
            --accent-light: #fcd59b;
            --success: #28B296;
            --success-bg: rgba(40, 178, 150, 0.1);
            --warning: #FAAF4C;
            --warning-bg: rgba(250, 175, 76, 0.1);
            --danger: #EC4273;
            --danger-bg: rgba(236, 66, 115, 0.1);
            --info: #439BCB;
            --info-bg: rgba(67, 155, 203, 0.1);
            --bg-main: #eef0f4;
            --bg-card: #ffffff;
            --bg-card-solid: #ffffff;
            --bg-nav: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a2e;
            --text-muted: #4a5568;
            --text-light: #718096;
            --border-color: #d8dce6;
            --border-strong: #c4c9d6;
            --shadow-xs: 0 1px 3px rgba(119, 37, 108, 0.06);
            --shadow-sm: 0 2px 8px rgba(119, 37, 108, 0.08);
            --shadow-md: 0 8px 24px rgba(119, 37, 108, 0.1);
            --shadow-lg: 0 16px 48px rgba(119, 37, 108, 0.14);
            --gradient-primary: linear-gradient(135deg, #77256C 0%, #945f8d 100%);
            --gradient-hero: linear-gradient(135deg, #5a1d52 0%, #77256C 40%, #945f8d 100%);
            --gradient-accent: linear-gradient(135deg, #FBB75E 0%, #f8a035 100%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-main: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        /* ============================================================
           RESET & BASE
           ============================================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 15px; scroll-behavior: smooth; }
        body {
            font-family: var(--font-main);
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        /* shimmer animation removed in v2.0 — was never referenced */
        .fade-up { animation: fadeSlideUp 0.5s ease-out forwards; opacity: 0; }
        .fade-up-d1 { animation-delay: 0.05s; }
        .fade-up-d2 { animation-delay: 0.1s; }
        .fade-up-d3 { animation-delay: 0.15s; }
        .fade-up-d4 { animation-delay: 0.2s; }

        /* ============================================================
           HEADER
           ============================================================ */
        .header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 52px;
            background: var(--bg-nav);
            /* backdrop-filter removed per CI style guide */
            border-bottom: 1px solid var(--border-color);
        }
        .header-left { display: flex; align-items: center; gap: 1.5rem; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .ci-logo { display: flex; align-items: center; gap: 0; font-size: 1.05rem; font-weight: 700; white-space: nowrap; }
        .ci-logo .logo-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--gradient-accent);
            margin-right: 6px; flex-shrink: 0;
        }
        .ci-logo .claim { color: var(--primary); }
        .ci-logo .informatics { color: var(--accent-dark); }
        .ci-logo .tm { font-size: 0.55rem; vertical-align: super; color: var(--text-light); margin-left: 1px; }
        .nav-tabs { display: flex; gap: 2px; }
        .nav-tab {
            padding: 6px 14px; border-radius: var(--radius-sm);
            font-size: 0.78rem; font-weight: 500; cursor: pointer;
            background: none; border: none; color: var(--text-muted);
            transition: all 0.2s;
        }
        .nav-tab:hover { background: var(--primary-faint); color: var(--text-main); }
        .nav-tab.active { background: var(--primary); color: #fff; }
        /* .theme-toggle removed in v2.0 — CI light-only policy */
        .powered-by {
            display: flex; flex-direction: column; align-items: flex-end;
            font-size: 0.55rem; color: var(--text-light); line-height: 1.2;
        }
        .powered-logo { font-size: 0.7rem; font-weight: 700; }
        .powered-logo .claim { color: #77256C; }
        .powered-logo .informatics { color: #FBB75E; }

        /* ============================================================
           PAGE CONTAINER
           ============================================================ */
        .page-container { max-width: 1440px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }

        /* ============================================================
           CLIENT HEADER
           ============================================================ */
        .client-header {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.75rem 0; margin-bottom: 0.25rem;
        }
        .client-header svg { width: 18px; height: 18px; color: var(--primary); flex-shrink: 0; }
        .client-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .client-subpk { font-size: 0.75rem; color: var(--text-muted); }

        /* ============================================================
           SECTION TABS
           ============================================================ */
        .section-bar {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 0; margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            flex-wrap: wrap;
        }
        .section-bar .label {
            font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.04em;
            margin-right: 0.25rem;
        }
        .section-btn {
            padding: 5px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 600; cursor: pointer;
            background: var(--primary-faint); border: 1px solid transparent;
            color: var(--text-muted); transition: all 0.2s; white-space: nowrap;
        }
        .section-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .section-btn.active {
            background: var(--gradient-primary); color: #fff;
            border-color: transparent; box-shadow: 0 2px 8px rgba(119, 37, 108, 0.25);
        }

        /* ============================================================
           STATS ROW
           ============================================================ */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 0.75rem; margin-bottom: 1.25rem;
        }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 1rem 1.1rem;
            box-shadow: var(--shadow-xs);
            display: flex; flex-direction: column; gap: 0.15rem;
        }
        .stat-card.hero {
            background: var(--gradient-hero); color: #fff;
            border: none; box-shadow: var(--shadow-md);
        }
        .stat-card.hero .stat-label { color: rgba(255,255,255,0.75); }
        .stat-card.hero .stat-sub { color: rgba(255,255,255,0.6); }
        .stat-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
        .stat-value { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
        .stat-sub { font-size: 0.7rem; color: var(--text-light); }

        /* ============================================================
           CARDS / SECTIONS
           ============================================================ */
        .card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); padding: 1.25rem;
            box-shadow: var(--shadow-sm); margin-bottom: 1rem;
        }
        .card-title {
            font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .card-title .icon {
            width: 28px; height: 28px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .card-title .icon svg { width: 16px; height: 16px; }
        .card-title .icon.purple { background: rgba(119, 37, 108, 0.1); color: var(--primary); }
        .card-title .icon.gold { background: rgba(251, 183, 94, 0.15); color: var(--accent-dark); }
        .card-title .icon.blue { background: rgba(67, 155, 203, 0.12); color: var(--info); }
        .card-title .icon.green { background: rgba(40, 178, 150, 0.12); color: var(--success); }
        .card-title .icon.red { background: rgba(236, 66, 115, 0.1); color: var(--danger); }
        .card-subtitle { font-size: 0.72rem; color: var(--text-muted); margin-left: auto; font-weight: 500; }

        /* ============================================================
           DATA TABLE
           ============================================================ */
        .table-wrap { overflow-x: auto; margin: 0 -0.25rem; }
        table.data-table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            font-size: 0.78rem;
        }
        table.data-table th {
            padding: 0.6rem 0.75rem; text-align: left;
            font-weight: 700; font-size: 0.7rem; text-transform: uppercase;
            letter-spacing: 0.04em; color: var(--text-muted);
            border-bottom: 2px solid var(--border-strong);
            position: sticky; top: 0; background: var(--bg-card-solid);
            z-index: 1; white-space: nowrap; cursor: pointer;
            user-select: none;
        }
        table.data-table th:hover { color: var(--primary); }
        table.data-table th .sort-arrow { font-size: 0.6rem; margin-left: 3px; opacity: 0.4; }
        table.data-table th .sort-arrow.active { opacity: 1; color: var(--primary); }
        table.data-table td {
            padding: 0.55rem 0.75rem;
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }
        table.data-table tr:hover td { background: var(--primary-faint); }
        table.data-table tr.selected td { background: rgba(119, 37, 108, 0.08); }
        td.mono { font-family: var(--font-mono); font-size: 0.72rem; }
        td.right, th.right { text-align: right; }

        /* ============================================================
           COMPLETENESS BAR
           ============================================================ */
        .completeness-bar {
            width: 100%; height: 8px; border-radius: 4px;
            background: rgba(0,0,0,0.06); overflow: hidden;
            position: relative;
        }
        .completeness-fill {
            height: 100%; border-radius: 4px;
            transition: width 0.6s ease;
        }
        .completeness-fill.high { background: var(--success); }
        .completeness-fill.medium { background: var(--warning); }
        .completeness-fill.low { background: var(--danger); }

        /* ============================================================
           BADGE
           ============================================================ */
        .badge {
            display: inline-flex; align-items: center; gap: 3px;
            padding: 2px 8px; border-radius: 10px;
            font-size: 0.68rem; font-weight: 600;
        }
        .badge.type-text { background: rgba(67, 155, 203, 0.12); color: var(--info); }
        .badge.type-numeric { background: rgba(119, 37, 108, 0.1); color: var(--primary); }
        .badge.type-date { background: rgba(40, 178, 150, 0.1); color: var(--success); }
        .badge.type-unknown { background: rgba(236, 66, 115, 0.08); color: var(--danger); }
        .badge.type-mixed { background: rgba(250, 175, 76, 0.12); color: var(--accent-dark); }

        /* ============================================================
           COLUMN FILTER & SEARCH
           ============================================================ */
        .filter-bar {
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 1rem; flex-wrap: wrap;
        }
        .search-input {
            flex: 1; min-width: 200px; padding: 8px 12px 8px 36px;
            border: 1px solid var(--border-color); border-radius: var(--radius-sm);
            background: var(--bg-card-solid); color: var(--text-main);
            font-family: var(--font-main); font-size: 0.82rem;
            outline: none; transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--primary); }
        .search-wrap { position: relative; flex: 1; min-width: 200px; }
        .search-wrap svg {
            position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px; color: var(--text-light); pointer-events: none;
        }
        .filter-chip {
            padding: 5px 12px; border-radius: 16px;
            font-size: 0.72rem; font-weight: 600; cursor: pointer;
            border: 1px solid var(--border-color); background: var(--bg-card-solid);
            color: var(--text-muted); transition: all 0.2s;
        }
        .filter-chip:hover { border-color: var(--primary-light); color: var(--primary); }
        .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        .filter-group { display: flex; gap: 4px; }

        /* ============================================================
           VALUE DISTRIBUTION
           ============================================================ */
        .value-panel {
            background: var(--bg-card-solid); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); overflow: hidden;
        }
        .value-panel-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
        }
        .value-panel-header h3 { font-size: 0.88rem; font-weight: 700; }
        .value-panel-header .close-btn {
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: var(--primary-faint); border: none; cursor: pointer;
            color: var(--text-muted); transition: all 0.2s;
        }
        .value-panel-header .close-btn:hover { background: var(--danger-bg); color: var(--danger); }
        .value-panel-header .close-btn svg { width: 14px; height: 14px; }
        .value-bar-row {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.4rem 1.25rem; border-bottom: 1px solid var(--border-color);
            font-size: 0.78rem; transition: background 0.15s;
        }
        .value-bar-row:last-child { border-bottom: none; }
        .value-bar-row:hover { background: var(--primary-faint); }
        .value-bar-row .val-name {
            min-width: 160px; max-width: 280px; font-family: var(--font-mono);
            font-size: 0.73rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .value-bar-row .val-bar-wrap {
            flex: 1; height: 6px; border-radius: 3px;
            background: rgba(0,0,0,0.05); overflow: hidden;
        }
        .value-bar-row .val-bar {
            height: 100%; border-radius: 3px; background: var(--primary-light);
            transition: width 0.4s ease;
        }
        .value-bar-row .val-count {
            min-width: 60px; text-align: right; font-family: var(--font-mono);
            font-size: 0.72rem; color: var(--text-muted); font-weight: 500;
        }
        .value-bar-row .val-pct {
            min-width: 55px; text-align: right; font-size: 0.72rem;
            color: var(--text-light); font-weight: 600;
        }

        /* ============================================================
           CHART CONTAINER
           ============================================================ */
        .chart-container { position: relative; width: 100%; height: 320px; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }

        /* ============================================================
           COLUMN DETAIL FLYOUT
           ============================================================ */
        .detail-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.35); backdrop-filter: blur(4px);
            display: flex; justify-content: flex-end;
            animation: fadeIn 0.2s ease;
        }
        .detail-panel {
            width: 580px; max-width: 95vw; height: 100vh;
            background: var(--bg-card-solid); overflow-y: auto;
            box-shadow: -8px 0 32px rgba(0,0,0,0.15);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        .detail-header {
            position: sticky; top: 0; z-index: 2;
            padding: 1.25rem 1.5rem; background: var(--bg-card-solid);
            border-bottom: 1px solid var(--border-color);
        }
        .detail-header h2 { font-size: 1rem; font-weight: 800; margin-bottom: 0.25rem; }
        .detail-header .meta { font-size: 0.72rem; color: var(--text-muted); display: flex; gap: 1rem; }
        .detail-body { padding: 1.25rem 1.5rem; }
        .detail-stat-row {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;
            margin-bottom: 1.25rem;
        }
        .detail-stat {
            padding: 0.8rem 1rem; border-radius: var(--radius-sm);
            background: var(--primary-faint);
        }
        .detail-stat .label { font-size: 0.68rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .detail-stat .val { font-size: 1.15rem; font-weight: 800; margin-top: 2px; }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 900px) {
            .chart-row { grid-template-columns: 1fr; }
            .stats-row { grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); }
            .nav-tabs { display: none; }
        }
        @media (max-width: 600px) {
            .page-container { padding: 0.75rem; }
            .card { padding: 1rem; }
            .detail-panel { width: 100vw; }
            .filter-bar { flex-direction: column; }
        }


        /* ============================================================
           MAPPING VALIDATION COMPONENTS
           ============================================================ */
        .mapping-status-badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 2px 8px; border-radius: 10px; font-size: 0.68rem;
            font-weight: 700; letter-spacing: 0.02em; white-space: nowrap;
        }
        .mapping-status-badge.mapped { background: var(--success-bg); color: var(--success); }
        .mapping-status-badge.unmapped { background: var(--danger-bg); color: var(--danger); }
        .mapping-status-badge.partial { background: var(--warning-bg); color: var(--warning); }
        .mapping-status-badge.pass { background: var(--success-bg); color: var(--success); }
        .mapping-status-badge.warn { background: var(--warning-bg); color: var(--warning); }
        .mapping-status-badge.fail { background: var(--danger-bg); color: var(--danger); }
        .mapping-status-badge .dot {
            width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
        }
        .mapping-status-badge.mapped .dot { background: var(--success); }
        .mapping-status-badge.unmapped .dot { background: var(--danger); }
        .mapping-status-badge.partial .dot { background: var(--warning); }
        .mapping-status-badge.pass .dot { background: var(--success); }
        .mapping-status-badge.warn .dot { background: var(--warning); }
        .mapping-status-badge.fail .dot { background: var(--danger); }

        .mapping-arrow {
            display: inline-flex; align-items: center; gap: 3px;
            color: var(--text-light); font-size: 0.72rem;
        }
        .mapping-arrow svg { width: 14px; height: 14px; }

        .validation-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0.75rem; margin-bottom: 1rem;
        }
        .validation-metric {
            padding: 0.85rem 1rem; border-radius: var(--radius-sm);
            background: var(--bg-card-solid); border: 1px solid var(--border-color);
            text-align: center; transition: transform 0.2s, box-shadow 0.2s;
        }
        .validation-metric:hover { transform: translateY(-2px); box-shadow: var(--shadow-sm); }
        .validation-metric .vm-label {
            font-size: 0.68rem; font-weight: 600; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 4px;
        }
        .validation-metric .vm-value {
            font-size: 1.4rem; font-weight: 800; line-height: 1.2;
        }
        .validation-metric .vm-sub {
            font-size: 0.68rem; color: var(--text-light); margin-top: 2px;
        }

        .db-field-tag {
            display: inline-block; padding: 1px 7px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.7rem; font-weight: 600;
            background: rgba(119, 37, 108, 0.08); color: var(--primary);
            border: 1px solid rgba(119, 37, 108, 0.12);
        }
        [data-theme="dark"] .db-field-tag {
            background: rgba(251, 183, 94, 0.1); color: var(--accent);
            border-color: rgba(251, 183, 94, 0.15);
        }
        .table-tag {
            display: inline-block; padding: 1px 6px; border-radius: 4px;
            font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .table-tag.claim { background: rgba(67, 155, 203, 0.12); color: var(--info); }
        .table-tag.claimline { background: rgba(40, 178, 150, 0.12); color: var(--success); }
        .edi-tag {
            display: inline-block; padding: 1px 6px; border-radius: 4px;
            font-family: var(--font-mono); font-size: 0.63rem; font-weight: 500;
            background: rgba(250, 175, 76, 0.1); color: var(--warning);
            border: 1px solid rgba(250, 175, 76, 0.12);
        }
        .phase-tabs {
            display: flex; gap: 0; margin-bottom: 1rem;
            border-radius: var(--radius-md); overflow: hidden;
            border: 1px solid var(--border-strong);
        }
        .phase-tab {
            flex: 1; padding: 0.65rem 1rem; text-align: center;
            font-size: 0.78rem; font-weight: 700; cursor: pointer;
            background: var(--bg-card-solid); color: var(--text-muted);
            border: none; transition: all 0.2s;
            border-right: 1px solid var(--border-color);
        }
        .phase-tab:last-child { border-right: none; }
        .phase-tab:hover { background: var(--primary-faint); }
        .phase-tab.active {
            background: var(--gradient-primary); color: white;
        }
        .phase-tab .tab-icon { font-size: 0.9rem; margin-right: 4px; }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(119, 37, 108, 0.2); border-radius: 3px; }

const fmt = {
    number: (n) => n == null ? '—' : n.toLocaleString('en-US'),
    pct: (n) => n == null ? '—' : (n * 100).toFixed(1) + '%',
    pctShort: (n) => n == null ? '—' : (n * 100).toFixed(0) + '%',
};

function getCompletenessClass(pctFilled) {
    if (pctFilled >= 0.9) return 'high';
    if (pctFilled >= 0.5) return 'medium';
    return 'low';
}

function getTypeBadge(dt) {
    if (!dt || dt === 'Unknown') return 'type-unknown';
    if (dt.includes('/')) return 'type-mixed';
    if (dt === 'Numeric') return 'type-numeric';
    if (dt === 'Date') return 'type-date';
    return 'type-text';
}

function EmptinessChart({ profiles }) {
    const canvasRef = useRef(null);
    const chartRef = useRef(null);

    useEffect(() => {
        if (!canvasRef.current) return;
        const sorted = [...profiles].sort((a, b) => b.pctEmpty - a.pctEmpty).slice(0, 30);
        const labels = sorted.map(p => p.column.length > 25 ? p.column.substring(0, 22) + '...' : p.column);
        const data = sorted.map(p => (p.pctEmpty * 100).toFixed(1));
        const colors = sorted.map(p => {
            if (p.pctEmpty >= 0.9) return '#EC4273';
            if (p.pctEmpty >= 0.5) return '#FAAF4C';
            if (p.pctEmpty >= 0.1) return '#439BCB';
            return '#28B296';
        });

        if (chartRef.current) chartRef.current.destroy();
        chartRef.current = new Chart(canvasRef.current, {
            type: 'bar',
            data: {
                labels,
                datasets: [{
                    data, backgroundColor: colors,
                    borderRadius: 4, borderSkipped: false, barPercentage: 0.7,
                }]
            },
            options: {
                indexAxis: 'y',
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: { label: (c) => `${c.parsed.x}% empty` }
                    }
                },
                scales: {
                    x: {
                        max: 100,
                        ticks: { callback: v => v + '%', color: isDark ? '#a59dba' : '#6b6185', font: { size: 10, family: 'DM Sans' } },
                        grid: { color: isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.05)' }
                    },
                    y: {
                        ticks: { color: isDark ? '#a59dba' : '#6b6185', font: { size: 10, family: 'DM Sans' } },
                        grid: { display: false }
                    }
                }
            }
        });

        return () => { if (chartRef.current) chartRef.current.destroy(); };
    }, [profiles]);

    return <canvas ref={canvasRef} />;
}

function SortArrow({ col, sortCol, sortDir }) {

// ============================================================
// MAIN APP
// ============================================================
function App() {
    const [activeSection, setActiveSection] = useState('premapping');
    const [search, setSearch] = useState('');
    const [typeFilter, setTypeFilter] = useState('all');
    const [sortCol, setSortCol] = useState('pctEmpty');
    const [sortDir, setSortDir] = useState('desc');
    const [selectedProfile, setSelectedProfile] = useState(null);
    const [completenessFilter, setCompletenessFilter] = useState('all');

    // Theme toggle removed in v2.0 per CI standing constraint (light-only)

    // FIX #3: Close flyout on Escape key
    useEffect(() => {
        const handleKeyDown = (e) => {
            if (e.key === 'Escape' && selectedProfile) {
                setSelectedProfile(null);
            }
        };
        document.addEventListener('keydown', handleKeyDown);
        return () => document.removeEventListener('keydown', handleKeyDown);
    }, [selectedProfile]);

    const D = PROFILE_DATA;
    const profiles = D.profiles;

    // FIX #5: Correct weighted average — total filled cells / total possible cells
    const stats = useMemo(() => {
        const complete = profiles.filter(p => p.pctFilled >= 0.99).length;
        const partial = profiles.filter(p => p.pctFilled >= 0.5 && p.pctFilled < 0.99).length;
        const sparse = profiles.filter(p => p.pctFilled > 0 && p.pctFilled < 0.5).length;
        const empty = profiles.filter(p => p.pctFilled === 0).length;
        // Weighted average: total filled cells / total possible cells
        const totalCells = profiles.reduce((s, p) => s + p.count, 0);
        const totalFilled = profiles.reduce((s, p) => s + p.filledCount, 0);
        const weightedCompleteness = totalCells > 0 ? totalFilled / totalCells : 0;
        return { complete, partial, sparse, empty, weightedCompleteness, totalCells, totalFilled };
    }, [profiles]);

    // Filter & sort
    const filteredProfiles = useMemo(() => {
        let result = [...profiles];
        if (search) {
            const s = search.toLowerCase();
            result = result.filter(p => p.column.toLowerCase().includes(s));
        }
        if (typeFilter !== 'all') {
            result = result.filter(p => (p.dataType || 'Unknown') === typeFilter);
        }
        if (completenessFilter !== 'all') {
            if (completenessFilter === 'complete') result = result.filter(p => p.pctFilled >= 0.99);
            if (completenessFilter === 'partial') result = result.filter(p => p.pctFilled >= 0.5 && p.pctFilled < 0.99);
            if (completenessFilter === 'sparse') result = result.filter(p => p.pctFilled > 0 && p.pctFilled < 0.5);
            if (completenessFilter === 'empty') result = result.filter(p => p.pctFilled === 0);
        }
        result.sort((a, b) => {
            let va = a[sortCol], vb = b[sortCol];
            if (typeof va === 'string') va = va.toLowerCase();
            if (typeof vb === 'string') vb = vb.toLowerCase();
            if (va < vb) return sortDir === 'asc' ? -1 : 1;
            if (va > vb) return sortDir === 'asc' ? 1 : -1;
            return 0;
        });
        return result;
    }, [search, typeFilter, completenessFilter, sortCol, sortDir]);


    // Mapping validation stats
    const mappingStats = useMemo(() => {
        const mapped = FIELD_MAPPING.length;
        const unmapped = profiles.length - mapped;
        const required = FIELD_MAPPING.filter(m => m.required);
        const requiredFilled = required.filter(m => {
            const p = PROFILE_BY_COL[m.src];
            return p && p.pctFilled >= 0.95;
        });
        const typeMatches = FIELD_MAPPING.map(m => {
            const p = PROFILE_BY_COL[m.src];
            if (!p) return { ...m, typeMatch: 'unknown' };
            const srcType = p.dataType || 'Unknown';
            const exp = m.expectedType;
            if (srcType === exp) return { ...m, typeMatch: 'exact', srcType, profile: p };
            if (srcType.includes('/') || srcType === 'Unknown') return { ...m, typeMatch: 'partial', srcType, profile: p };
            if ((exp === 'Numeric' && srcType === 'Text') || (exp === 'Text' && srcType === 'Numeric')) return { ...m, typeMatch: 'mismatch', srcType, profile: p };
            return { ...m, typeMatch: 'partial', srcType, profile: p };
        });
        const exactMatch = typeMatches.filter(t => t.typeMatch === 'exact').length;
        const partialMatch = typeMatches.filter(t => t.typeMatch === 'partial').length;
        const mismatch = typeMatches.filter(t => t.typeMatch === 'mismatch').length;
        const claimFields = FIELD_MAPPING.filter(m => m.table === 'claim').length;
        const claimlineFields = FIELD_MAPPING.filter(m => m.table === 'claimline').length;
        const dualMapped = FIELD_MAPPING.filter(m => m.dbField2).length;
        return { mapped, unmapped, required: required.length, requiredFilled: requiredFilled.length,
                 typeMatches, exactMatch, partialMatch, mismatch,
                 claimFields, claimlineFields, dualMapped };
    }, [profiles]);

    // Pre-mapping validation checks per field
    const preValidation = useMemo(() => {
        return profiles.map(p => {
            const m = SRC_TO_MAPPING[p.column];
            const checks = [];
            // Completeness check
            if (m && m.required && p.pctFilled < 0.95) checks.push({ rule: 'Required field below 95%', severity: 'fail', detail: fmt.pct(p.pctFilled) + ' filled' });
            else if (p.pctFilled >= 0.99) checks.push({ rule: 'Completeness', severity: 'pass', detail: fmt.pct(p.pctFilled) });
            else if (p.pctFilled >= 0.5) checks.push({ rule: 'Completeness', severity: 'warn', detail: fmt.pct(p.pctFilled) });
            else checks.push({ rule: 'Completeness', severity: p.pctFilled === 0 ? 'fail' : 'warn', detail: fmt.pct(p.pctFilled) });
            // Type consistency
            if (m) {
                const srcT = p.dataType || 'Unknown';
                if (srcT === m.expectedType) checks.push({ rule: 'Type match', severity: 'pass', detail: srcT + ' = ' + m.expectedType });
                else if (srcT.includes('/') || srcT === 'Unknown') checks.push({ rule: 'Type ambiguous', severity: 'warn', detail: srcT + ' vs ' + m.expectedType });
                else checks.push({ rule: 'Type mismatch', severity: 'fail', detail: srcT + ' ≠ ' + m.expectedType });
            }
            // Cardinality check (detect possible ID fields with low cardinality or lookup fields with high)
            if (p.filledCount > 0) {
                const card = p.distinctCount / p.filledCount;
                if (card === 1 / p.filledCount) checks.push({ rule: 'Single value (constant)', severity: 'warn', detail: '1 distinct value' });
            }
            // Mapping status
            if (m) checks.push({ rule: 'Mapping', severity: 'pass', detail: 'Mapped → ' + m.dbField });
            else checks.push({ rule: 'Mapping', severity: 'warn', detail: 'No CI mapping defined' });
            const worstSev = checks.some(c => c.severity === 'fail') ? 'fail' : checks.some(c => c.severity === 'warn') ? 'warn' : 'pass';
            return { ...p, checks, worstSev, mapping: m };
        });
    }, [profiles]);

    const handleSort = useCallback((col) => {
        setSortCol(prev => {
            if (prev === col) {
                setSortDir(d => d === 'asc' ? 'desc' : 'asc');
                return col;
            }
            setSortDir(col === 'column' ? 'asc' : 'desc');
            return col;
        });
    }, []);

    // SortArrow is now defined outside App — pass sortCol/sortDir as props
    const SA = useCallback(({ col }) => <SortArrow col={col} sortCol={sortCol} sortDir={sortDir} />, [sortCol, sortDir]);

    const navTabs = ['Home', 'Claims Data', 'Edits', 'Recovery', 'Reconciliation', 'Reports'];
    const sectionTabs = [
        { id: 'premapping', label: 'Pre-Mapping' },
        { id: 'postmapping', label: 'Post-Mapping' },
        { id: 'emptiness', label: 'Field Emptiness' },
        { id: 'uniquevalues', label: 'Unique Values' },
        { id: 'overview', label: 'Overview' },
        { id: 'categories', label: 'By Category' },
    ];

    const dataTypes = useMemo(() => {
        const s = new Set(profiles.map(p => p.dataType || 'Unknown'));
        return ['all', ...Array.from(s).sort()];
    }, [profiles]);

    return (
        <React.Fragment>
            {/* HEADER */}
            <div className="header">
                <div className="header-left">
                    <div className="ci-logo">
                        <span className="logo-dot"></span>
                        <span className="claim">Claim</span>
                        <span className="informatics">Informatics</span>
                        <span className="tm">™</span>
                    </div>
                    <div className="nav-tabs">
                        {navTabs.map((tab, i) => (
                            <button key={tab} className={`nav-tab ${i === 1 ? 'active' : ''}`}>{tab}</button>
                        ))}
                    </div>
                </div>
                <div className="header-right">
                    {/* Theme toggle removed v2.0 — CI light-only policy */}
                    <div className="powered-by">
                        <span>powered by</span>
                        <span className="powered-logo">
                            <span className="claim" style={{color:'#77256C'}}>Claim</span>
                            <span className="informatics" style={{color:'#FBB75E'}}>Informatics</span>
                            <span style={{fontSize:'0.5rem',verticalAlign:'super',color:'var(--text-light)'}}>™</span>
                        </span>
                    </div>
                </div>
            </div>

            {/* PAGE */}
            <div className="page-container">
                {/* Client Header */}
                <div className="client-header fade-up">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"/></svg>
                    <span className="client-name">Client Name</span>
                    <span className="client-subpk" style={{marginLeft:'0.5rem',fontSize:'0.75rem',color:'var(--text-muted)'}}>
                        Pre & Post Mapping Validation
                    </span>
                </div>

                {/* Section Nav */}
                <div className="section-bar fade-up fade-up-d1">
                    <span className="label">View:</span>
                    {sectionTabs.map(tab => (
                        <button key={tab.id}
                            className={`section-btn ${activeSection === tab.id ? 'active' : ''}`}
                            onClick={() => setActiveSection(tab.id)}>
                            {tab.label}
                        </button>
                    ))}
                </div>

                {/* ===== SUMMARY STATS ===== */}
                <div className="stats-row fade-up fade-up-d2">
                    <div className="stat-card hero">
                        <span className="stat-label">Overall Completeness</span>
                        <span className="stat-value">{fmt.pct(stats.weightedCompleteness)}</span>
                        <span className="stat-sub">Weighted: {fmt.number(stats.totalFilled)} filled of {fmt.number(stats.totalCells)} cells</span>
                    </div>
                    <div className="stat-card">
                        <span className="stat-label">Total Rows</span>
                        <span className="stat-value">{fmt.number(D.totalRows)}</span>
                        <span className="stat-sub">Claimlines in extract</span>
                    </div>
                    <div className="stat-card">
                        <span className="stat-label">Columns</span>
                        <span className="stat-value">{D.totalColumns}</span>
                        <span className="stat-sub">{stats.complete} complete ({'>'}99%)</span>
                    </div>
                    <div className="stat-card" style={{borderLeft: '3px solid var(--success)'}}>
                        <span className="stat-label">Complete</span>
                        <span className="stat-value" style={{color:'var(--success)'}}>{stats.complete}</span>
                        <span className="stat-sub">≥99% filled</span>
                    </div>
                    <div className="stat-card" style={{borderLeft: '3px solid var(--warning)'}}>

                        <span className="stat-value" style={{color:'var(--warning)'}}>{stats.partial}</span>

                    </div>
                    <div className="stat-card" style={{borderLeft: '3px solid var(--danger)'}}>
                        <span className="stat-label">Sparse / Empty</span>
                        <span className="stat-value" style={{color:'var(--danger)'}}>{stats.sparse + stats.empty}</span>
                        <span className="stat-sub">{stats.empty} completely empty</span>
                    </div>
                </div>

                {/* ===== FILTER BAR ===== */}
                <div className="filter-bar fade-up fade-up-d3">
                    <div className="search-wrap">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <input className="search-input" placeholder="Search columns..." value={search} onChange={e => setSearch(e.target.value)} />
                    </div>
                    <div className="filter-group">
                        {['all', 'complete', 'partial', 'sparse', 'empty'].map(f => (
                            <button key={f} className={`filter-chip ${completenessFilter === f ? 'active' : ''}`}
                                    onClick={() => setCompletenessFilter(f)}>
                                {f === 'all' ? 'All' : f.charAt(0).toUpperCase() + f.slice(1)}
                            </button>
                        ))}
                    </div>
                    <div className="filter-group">
                        {dataTypes.map(t => (
                            <button key={t} className={`filter-chip ${typeFilter === t ? 'active' : ''}`}
                                    onClick={() => setTypeFilter(t)}>
                                {t === 'all' ? 'All Types' : t}
                            </button>
                        ))}
                    </div>
                </div>


                {/* ===== SECTION: PRE-MAPPING VALIDATION ===== */}
                {activeSection === 'premapping' && (
                    <div className="fade-up fade-up-d4">
                        <div className="validation-grid">
                            <div className="validation-metric" style={{borderTop: '3px solid var(--primary)'}}>
                                <div className="vm-label">Source Columns</div>
                                <div className="vm-value" style={{color:'var(--primary)'}}>{profiles.length}</div>
                                <div className="vm-sub">{D.fileName}</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--success)'}}>
                                <div className="vm-label">Mapped to CI</div>
                                <div className="vm-value" style={{color:'var(--success)'}}>{mappingStats.mapped}</div>
                                <div className="vm-sub">{mappingStats.dualMapped} dual-mapped</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--danger)'}}>
                                <div className="vm-label">Required Fields</div>
                                <div className="vm-value" style={{color: mappingStats.requiredFilled === mappingStats.required ? 'var(--success)' : 'var(--danger)'}}>
                                    {mappingStats.requiredFilled}/{mappingStats.required}
                                </div>
                                <div className="vm-sub">{mappingStats.requiredFilled === mappingStats.required ? 'All populated ≥95%' : 'Some below threshold'}</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--info)'}}>
                                <div className="vm-label">Type Match</div>
                                <div className="vm-value" style={{color:'var(--info)'}}>
                                    {mappingStats.exactMatch}/{mappingStats.mapped}
                                </div>
                                <div className="vm-sub">{mappingStats.partialMatch} ambiguous · {mappingStats.mismatch} mismatch</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--warning)'}}>
                                <div className="vm-label">Claim Table</div>
                                <div className="vm-value" style={{color:'var(--warning)'}}>{mappingStats.claimFields}</div>
                                <div className="vm-sub">cl_* fields</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--accent)'}}>
                                <div className="vm-label">Claimline Table</div>
                                <div className="vm-value" style={{color:'var(--accent)'}}>{mappingStats.claimlineFields}</div>
                                <div className="vm-sub">ln_* fields</div>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-title">
                                <div className="icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                                Pre-Mapping Source Data Validation
                                <span className="card-subtitle">Quality checks on raw extract before CI database mapping</span>
                            </div>

                            <div className="heatmap-legend">
                                <div className="swatch" style={{background:'var(--success)'}} /> Pass
                                <div className="swatch" style={{background:'var(--warning)',marginLeft:8}} /> Warning
                                <div className="swatch" style={{background:'var(--danger)',marginLeft:8}} /> Fail
                            </div>

                            <div className="table-wrap" style={{maxHeight:'60vh',overflowY:'auto'}}>
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th onClick={() => handleSort('column')}>Source Column <SA col="column" /></th>
                                            <th>Type</th>
                                            <th className="right">Filled</th>
                                            <th className="right">% Filled</th>
                                            <th>Required</th>
                                            <th>Validation</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {preValidation.filter(p => {
                                            if (!search) return true;
                                            return p.column.toLowerCase().includes(search.toLowerCase());
                                        }).map(p => (
                                            <tr key={p.column} onClick={() => setSelectedProfile(p)} style={{cursor:'pointer'}}>
                                                <td style={{fontWeight:600,maxWidth:260,overflow:'hidden',textOverflow:'ellipsis'}} title={p.column}>
                                                    {p.column}
                                                    {p.mapping && <span className="mapping-arrow" style={{marginLeft:6}}>
                                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
                                                        <span className="db-field-tag">{p.mapping.dbField}</span>
                                                    </span>}
                                                </td>
                                                <td><TypeBadge dataType={p.dataType} /></td>
                                                <td className="right mono">{fmt.number(p.filledCount)}</td>
                                                <td className="right mono" style={{fontWeight:600, color: p.pctFilled >= 0.99 ? 'var(--success)' : p.pctFilled >= 0.5 ? 'var(--warning)' : 'var(--danger)'}}>
                                                    {fmt.pct(p.pctFilled)}
                                                </td>
                                                <td>{p.mapping ? (p.mapping.required ?
                                                    <span className="mapping-status-badge fail" style={{background:'rgba(236,66,115,0.08)'}}><span className="dot"></span>Required</span> :
                                                    <span style={{fontSize:'0.72rem',color:'var(--text-light)'}}>Optional</span>
                                                ) : <span style={{fontSize:'0.72rem',color:'var(--text-light)'}}>—</span>}</td>
                                                <td>{p.checks.slice(0, 2).map((c, i) => (
                                                    <span key={i} className={`mapping-status-badge ${c.severity}`} style={{marginRight:4,marginBottom:2}} title={c.detail}>
                                                        <span className="dot"></span>{c.rule}
                                                    </span>
                                                ))}</td>
                                                <td>
                                                    <span className={`mapping-status-badge ${p.worstSev}`}>
                                                        <span className="dot"></span>
                                                        {p.worstSev === 'pass' ? 'Pass' : p.worstSev === 'warn' ? 'Warning' : 'Fail'}
                                                    </span>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                )}


                {/* ===== SECTION: POST-MAPPING VALIDATION ===== */}
                {activeSection === 'postmapping' && (
                    <div className="fade-up fade-up-d4">
                        <div className="validation-grid">
                            <div className="validation-metric" style={{borderTop: '3px solid var(--success)'}}>
                                <div className="vm-label">Mapping Coverage</div>
                                <div className="vm-value" style={{color:'var(--success)'}}>{fmt.pctShort(mappingStats.mapped / profiles.length)}</div>
                                <div className="vm-sub">{mappingStats.mapped} of {profiles.length} columns mapped</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--info)'}}>
                                <div className="vm-label">Type Compatibility</div>
                                <div className="vm-value" style={{color:'var(--info)'}}>{fmt.pctShort(mappingStats.exactMatch / mappingStats.mapped)}</div>
                                <div className="vm-sub">{mappingStats.exactMatch} exact · {mappingStats.partialMatch} partial · {mappingStats.mismatch} mismatch</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--primary)'}}>
                                <div className="vm-label">Required Ready</div>
                                <div className="vm-value" style={{color: mappingStats.requiredFilled === mappingStats.required ? 'var(--success)' : 'var(--danger)'}}>
                                    {fmt.pctShort(mappingStats.requiredFilled / mappingStats.required)}
                                </div>
                                <div className="vm-sub">{mappingStats.requiredFilled} of {mappingStats.required} required fields ≥95%</div>
                            </div>
                            <div className="validation-metric" style={{borderTop: '3px solid var(--accent)'}}>
                                <div className="vm-label">Dual-Mapped</div>
                                <div className="vm-value" style={{color:'var(--accent)'}}>{mappingStats.dualMapped}</div>
                                <div className="vm-sub">Fields mapped to both claim + claimline</div>
                            </div>
                        </div>

                        <div className="card">
                            <div className="card-title">
                                <div className="icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
                                Post-Mapping Field Validation
                                <span className="card-subtitle">Source extract → CI database schema mapping verification</span>
                            </div>

                            <div className="table-wrap" style={{maxHeight:'60vh',overflowY:'auto'}}>
                                <table className="data-table">
                                    <thead>
                                        <tr>
                                            <th>Source Column</th>
                                            <th>CI Database Field</th>
                                            <th>Table</th>
                                            <th>EDI Source</th>
                                            <th>Type Check</th>
                                            <th className="right">% Filled</th>
                                            <th>Mapping Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {mappingStats.typeMatches.filter(m => {
                                            if (!search) return true;
                                            const s = search.toLowerCase();
                                            return m.src.toLowerCase().includes(s) || m.dbField.toLowerCase().includes(s) || (m.edi || '').toLowerCase().includes(s);
                                        }).map((m, i) => {
                                            const p = m.profile;
                                            const pctFilled = p ? p.pctFilled : 0;
                                            return (
                                                <tr key={m.src} onClick={() => p && setSelectedProfile(p)} style={{cursor:'pointer'}}>
                                                    <td style={{fontWeight:600,maxWidth:220,overflow:'hidden',textOverflow:'ellipsis'}} title={m.src}>{m.src}</td>
                                                    <td>
                                                        <span className="db-field-tag">{m.dbField}</span>
                                                        {m.dbField2 && <><br/><span className="db-field-tag" style={{marginTop:2}}>{m.dbField2}</span></>}
                                                    </td>
                                                    <td>
                                                        <span className={`table-tag ${m.table}`}>{m.table}</span>
                                                        {m.table2 && <><br/><span className={`table-tag ${m.table2}`} style={{marginTop:2}}>{m.table2}</span></>}
                                                    </td>
                                                    <td><span className="edi-tag">{m.edi}</span></td>
                                                    <td>
                                                        <span className={`mapping-status-badge ${m.typeMatch === 'exact' ? 'pass' : m.typeMatch === 'partial' ? 'warn' : 'fail'}`}>
                                                            <span className="dot"></span>
                                                            {m.typeMatch === 'exact' ? 'Match' : m.typeMatch === 'partial' ? 'Ambiguous' : 'Mismatch'}
                                                        </span>
                                                        {m.srcType && <div style={{fontSize:'0.63rem',color:'var(--text-light)',marginTop:2}}>{m.srcType} → {m.expectedType}</div>}
                                                    </td>
                                                    <td className="right">
                                                        <div style={{display:'flex',alignItems:'center',gap:6,justifyContent:'flex-end'}}>
                                                            <div className="completeness-bar" style={{width:50,height:6}}>
                                                                <div className={`completeness-fill ${getCompletenessClass(pctFilled)}`} style={{width: `${Math.max(pctFilled*100,0.5)}%`}} />
                                                            </div>
                                                            <span className="mono" style={{fontSize:'0.72rem',fontWeight:600,color: pctFilled >= 0.9 ? 'var(--success)' : pctFilled >= 0.5 ? 'var(--warning)' : 'var(--danger)'}}>{fmt.pct(pctFilled)}</span>
                                                        </div>
                                                    </td>
                                                    <td>
                                                        <span className={`mapping-status-badge ${pctFilled > 0 ? 'mapped' : 'unmapped'}`}>
                                                            <span className="dot"></span>
                                                            {pctFilled > 0 ? (m.required ? 'Required ✓' : 'Mapped') : (m.required ? 'REQUIRED ✗' : 'Empty')}
                                                        </span>
                                                    </td>
                                                </tr>
                                            );
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                )}

                {/* ===== SECTION: OVERVIEW ===== */}
                {activeSection === 'overview' && (
                    <div className="chart-row fade-up fade-up-d4">
                        <div className="card">
                            <div className="card-title">
                                <div className="icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="M12 6v6l4 2"/></svg></div>
                                Top 30 Emptiest Fields
                            </div>
                            <div style={{height:500}}>
                                <EmptinessChart profiles={profiles} />
                            </div>
                        </div>
                        <div className="card">
                            <div className="card-title">
                                <div className="icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>
                                Data Type Distribution
                            </div>
                            <div style={{height:280}}>
                                <DataTypeChart profiles={profiles} />
                            </div>
                        </div>
                    </div>
                )}

                {/* ===== SECTION: FIELD EMPTINESS TABLE ===== */}
                {activeSection === 'emptiness' && (
                    <div className="card fade-up fade-up-d4">
                        <div className="card-title">
                            <div className="icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg></div>
                            Field Emptiness Analysis
                            <span className="card-subtitle">{filteredProfiles.length} of {profiles.length} columns · Click row for details</span>
                        </div>

                        <div className="heatmap-legend">
                            <div className="swatch" style={{background:'var(--success)'}} /> ≥90% filled
                            <div className="swatch" style={{background:'var(--warning)',marginLeft:8}} /> 50–90%
                            <div className="swatch" style={{background:'var(--danger)',marginLeft:8}} /> {'<'}50%
                        </div>

                        <div className="table-wrap" style={{maxHeight:'65vh',overflowY:'auto'}}>
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th onClick={() => handleSort('column')}>Column <SA col="column" /></th>
                                        <th onClick={() => handleSort('dataType')}>Type <SA col="dataType" /></th>
                                        <th className="right" onClick={() => handleSort('count')}>Count <SA col="count" /></th>
                                        <th className="right" onClick={() => handleSort('distinctCount')}>Distinct <SA col="distinctCount" /></th>
                                        <th className="right" onClick={() => handleSort('nullCount')}>Null <SA col="nullCount" /></th>
                                        <th className="right" onClick={() => handleSort('pctEmpty')}>% Empty <SA col="pctEmpty" /></th>
                                        <th style={{minWidth:120}}>Completeness</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredProfiles.map((p, i) => (
                                        <tr key={p.column} onClick={() => setSelectedProfile(p)}
                                            style={{cursor:'pointer'}}
                                            className={selectedProfile && selectedProfile.column === p.column ? 'selected' : ''}>
                                            <td style={{fontWeight:600,maxWidth:280,overflow:'hidden',textOverflow:'ellipsis'}} title={p.column}>{p.column}</td>
                                            <td><TypeBadge dataType={p.dataType} /></td>
                                            <td className="right mono">{fmt.number(p.count)}</td>
                                            <td className="right mono">{fmt.number(p.distinctCount)}</td>
                                            <td className="right mono" style={{color: p.nullCount > 0 ? 'var(--danger)' : 'var(--success)'}}>
                                                {fmt.number(p.nullCount)}
                                            </td>
                                            <td className="right mono" style={{fontWeight:600,color: p.pctEmpty >= 0.5 ? 'var(--danger)' : p.pctEmpty >= 0.1 ? 'var(--warning)' : 'var(--success)'}}>
                                                {fmt.pct(p.pctEmpty)}
                                            </td>
                                            <td><CompletenessBar pctFilled={p.pctFilled} /></td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                )}

                {/* ===== SECTION: UNIQUE VALUES TABLE ===== */}
                {activeSection === 'uniquevalues' && (
                    <div className="card fade-up fade-up-d4">
                        <div className="card-title">
                            <div className="icon gold"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg></div>
                            Unique Value Distribution
                            <span className="card-subtitle">Click any column to view top values</span>
                        </div>

                        <div className="table-wrap" style={{maxHeight:'65vh',overflowY:'auto'}}>
                            <table className="data-table">
                                <thead>
                                    <tr>
                                        <th onClick={() => handleSort('column')}>Column <SA col="column" /></th>
                                        <th onClick={() => handleSort('dataType')}>Type <SA col="dataType" /></th>
                                        <th className="right" onClick={() => handleSort('filledCount')}>Filled <SA col="filledCount" /></th>
                                        <th className="right" onClick={() => handleSort('distinctCount')}>Distinct <SA col="distinctCount" /></th>
                                        <th className="right">Cardinality</th>
                                        <th>Top Value</th>
                                        <th className="right">Top Count</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredProfiles.map((p, i) => {
                                        const card = p.filledCount > 0 ? (p.distinctCount / p.filledCount) : 0;
                                        const topVal = p.topValues.length > 0 ? p.topValues[0] : null;
                                        return (
                                            <tr key={p.column} onClick={() => setSelectedProfile(p)}
                                                style={{cursor:'pointer'}}
                                                className={selectedProfile && selectedProfile.column === p.column ? 'selected' : ''}>
                                                <td style={{fontWeight:600,maxWidth:280,overflow:'hidden',textOverflow:'ellipsis'}} title={p.column}>{p.column}</td>
                                                <td><TypeBadge dataType={p.dataType} /></td>
                                                <td className="right mono">{fmt.number(p.filledCount)}</td>
                                                <td className="right mono" style={{fontWeight:700,color:'var(--info)'}}>{fmt.number(p.distinctCount)}</td>
                                                <td className="right mono" style={{color: card > 0.5 ? 'var(--success)' : card > 0.01 ? 'var(--warning)' : 'var(--text-light)'}}>
                                                    {card > 0 ? (card * 100).toFixed(1) + '%' : '—'}
                                                </td>
                                                <td className="mono" style={{maxWidth:200,overflow:'hidden',textOverflow:'ellipsis'}} title={topVal ? topVal.value : ''}>
                                                    {topVal ? topVal.value : '—'}
                                                </td>
                                                <td className="right mono">{topVal ? fmt.number(topVal.count) : '—'}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                )}

                {/* ===== SECTION: BY CATEGORY ===== */}
                {activeSection === 'categories' && (
                    <div className="fade-up fade-up-d4">
                        {Object.entries(FIELD_CATEGORIES).map(([cat, cols]) => {
                            const catProfiles = profiles.filter(p => cols.includes(p.column));
                            if (catProfiles.length === 0) return null;
                            const catAvg = catProfiles.reduce((s, p) => s + p.pctFilled, 0) / catProfiles.length;
                            return (
                                <div className="card" key={cat}>
                                    <div className="card-title">
                                        <div className="icon purple">
                                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                                        </div>
                                        {cat}
                                        <span className="card-subtitle" style={{color: getCompletenessClass(catAvg)==='high' ? 'var(--success)' : getCompletenessClass(catAvg)==='medium' ? 'var(--warning)' : 'var(--danger)'}}>
                                            {catProfiles.length} fields · Avg {fmt.pct(catAvg)} complete
                                        </span>
                                    </div>
                                    <div className="table-wrap">
                                        <table className="data-table">
                                            <thead>
                                                <tr>
                                                    <th>Column</th><th>Type</th><th className="right">Filled</th><th className="right">Null</th><th className="right">% Empty</th><th className="right">Distinct</th><th>Completeness</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {catProfiles.map(p => (
                                                    <tr key={p.column} onClick={() => setSelectedProfile(p)} style={{cursor:'pointer'}}>
                                                        <td style={{fontWeight:600}}>{p.column}</td>
                                                        <td><TypeBadge dataType={p.dataType} /></td>
                                                        <td className="right mono">{fmt.number(p.filledCount)}</td>
                                                        <td className="right mono" style={{color:p.nullCount > 0 ? 'var(--danger)' : 'var(--success)'}}>{fmt.number(p.nullCount)}</td>
                                                        <td className="right mono" style={{fontWeight:600}}>{fmt.pct(p.pctEmpty)}</td>
                                                        <td className="right mono">{fmt.number(p.distinctCount)}</td>
                                                        <td><CompletenessBar pctFilled={p.pctFilled} /></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                )}

                {/* FOOTER */}
                <div style={{textAlign:'center',padding:'2rem 0 1rem',fontSize:'0.7rem',color:'var(--text-light)'}}>
                    Data Source: {D.fileName} · {fmt.number(D.totalRows)} rows × {D.totalColumns} columns · Profiled 2026-02-25 · v2.0
                </div>
            </div>

            {/* DETAIL FLYOUT */}
            {selectedProfile && (
                <DetailPanel profile={selectedProfile} onClose={() => setSelectedProfile(null)} />
            )}
        </React.Fragment>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
