// ============================================================
// CSV PARSER (handles quoted fields)
// ============================================================
function detectDelimiter(firstLine) {
  const candidates = [',', '\t', '|', ';'];
  let best = ',', bestCount = 0;
  candidates.forEach(d => {
    const count = firstLine.split(d).length - 1;
    if (count > bestCount) { bestCount = count; best = d; }
  });
  return best;
}

function parseCSVLine(line, delim) {
  // Fast path — no quotes present (covers nearly all pipe/tab/semicolon files)
  if (line.indexOf('"') === -1) {
    return line.split(delim).map(v => v.trim());
  }
  // Slow path — handle quoted fields
  const result = [];
  let current = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; }
    else if (c === delim && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += c; }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  const rawLines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const lines = rawLines.filter(l => l.trim().length > 0);
  if (lines.length < 2) return { headers: [], rows: [], delim: ',' };
  const delim = detectDelimiter(lines[0]);
  const headers = parseCSVLine(lines[0], delim).map(h => h.replace(/^"|"$/g, '').trim());
  const hLen = headers.length;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i], delim);
    const row = {};
    for (let j = 0; j < hLen; j++) {
      const v = vals[j];
      row[headers[j]] = v ? v.replace(/^"|"$/g, '').trim() : '';
    }
    rows.push(row);
  }
  return { headers, rows, delim };
}

// Async chunked parser — yields to the browser every CHUNK rows so large files
// don't freeze/kill the script. onProgress(rowsDone, rowsTotal), onDone(parsed|null).
function parseCSVChunked(text, onProgress, onDone) {
  try {
    if (!text || typeof text !== 'string') { onDone(null); return; }
    const CHUNK = 5000;
    // Normalise line endings then split — more reliable than regex split
    const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const lines = raw.split('\n');
    // find first non-blank line
    let start = 0;
    while (start < lines.length && !lines[start].trim()) start++;
    if (start >= lines.length) { onDone(null); return; }
    const delim = detectDelimiter(lines[start]);
    const headers = parseCSVLine(lines[start], delim).map(h => h.replace(/^"|"$/g, '').trim()).filter(Boolean);
    if (!headers.length) { onDone(null); return; }
    const hLen = headers.length;
    const total = lines.length;
    const rows = [];
    let i = start + 1;
    function step() {
      try {
        const end = Math.min(i + CHUNK, total);
        for (; i < end; i++) {
          const line = lines[i];
          if (!line || !line.trim()) continue;
          const vals = parseCSVLine(line, delim);
          const row = {};
          for (let j = 0; j < hLen; j++) {
            const v = vals[j];
            row[headers[j]] = v ? v.replace(/^"|"$/g, '').trim() : '';
          }
          rows.push(row);
        }
        onProgress(rows.length, Math.max(total - start - 1, 1));
        if (i < total) { setTimeout(step, 0); }
        else { onDone({ headers, rows, delim }); }
      } catch(e) {
        console.error('parseCSVChunked step error:', e);
        onDone(rows.length ? { headers, rows, delim } : null);
      }
    }
    setTimeout(step, 0);
  } catch(e) {
    console.error('parseCSVChunked init error:', e);
    onDone(null);
  }
}

            <span>Powered by</span>
            <span className="powered-logo"><span className="claim">Claim</span><span className="informatics">Informatics</span></span>
          </div>
        </div>
      </div>

      {/* PAGE */}

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
          <span className="client-name">CI Calculations — Validation Portal</span>
          <span className="client-sub">Standard Calculations Reference v3.2 · {METRICS.length} metrics · {FIELD_REFERENCE.length} fields · {MV_RULES.length} validation rules</span>
        </div>

        {/* SECTION BAR (mobile/alternative nav) */}

          <span className="label">Section:</span>
          {TABS.map(t => (
            <button key={t.key} className={`section-btn ${tab === t.key ? 'active' : ''}`} onClick={() => setTab(t.key)}>{t.label}</button>
