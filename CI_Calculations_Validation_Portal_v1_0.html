<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimInformatics™ — CI Calculations Validation Portal v1.0</title>
    <!-- v1.0 | 2026-03-16 | Interactive reference & validation portal for CI Standard Calculations v3.2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* ============================================================
           CSS VARIABLES — ClaimInformatics Brand System
           ============================================================ */
        :root {
            --primary: #77256C;
            --primary-dark: #5a1d52;
            --primary-light: #945F8D;
            --primary-faint: rgba(119, 37, 108, 0.06);
            --accent: #FBB75E;
            --accent-dark: #e9a045;
            --accent-light: #fcd59b;
            --success: #28B296;
            --success-bg: rgba(40, 178, 150, 0.1);
            --warning: #FAAF4C;
            --warning-bg: rgba(250, 175, 76, 0.1);
            --danger: #EC4273;
            --danger-bg: rgba(236, 66, 115, 0.1);
            --info: #439BCB;
            --info-bg: rgba(67, 155, 203, 0.1);
            --bg-main: #eef0f4;
            --bg-card: #ffffff;
            --bg-nav: rgba(255, 255, 255, 0.95);
            --text-main: #1a1a2e;
            --text-muted: #4a5568;
            --text-light: #718096;
            --border-color: #d8dce6;
            --border-strong: #c4c9d6;
            --shadow-xs: 0 1px 3px rgba(119, 37, 108, 0.06);
            --shadow-sm: 0 2px 8px rgba(119, 37, 108, 0.08);
            --shadow-md: 0 8px 24px rgba(119, 37, 108, 0.1);
            --shadow-lg: 0 16px 48px rgba(119, 37, 108, 0.14);
            --gradient-primary: linear-gradient(135deg, #77256C 0%, #945f8d 100%);
            --gradient-hero: linear-gradient(135deg, #5a1d52 0%, #77256C 40%, #945f8d 100%);
            --gradient-accent: linear-gradient(135deg, #FBB75E 0%, #f8a035 100%);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --font-main: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { font-size: 15px; scroll-behavior: smooth; }
        body {
            font-family: var(--font-main);
            background: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-up { animation: fadeSlideUp 0.5s ease-out forwards; opacity: 0; }
        .fade-up-d1 { animation-delay: 0.05s; }
        .fade-up-d2 { animation-delay: 0.1s; }
        .fade-up-d3 { animation-delay: 0.15s; }
        .fade-up-d4 { animation-delay: 0.2s; }

        /* ============================================================ HEADER */
        .header {
            position: sticky; top: 0; z-index: 100;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 1.5rem; height: 52px;
            background: var(--bg-nav);
            border-bottom: 1px solid var(--border-color);
        }
        .header-left { display: flex; align-items: center; gap: 1.5rem; }
        .header-right { display: flex; align-items: center; gap: 1rem; }
        .ci-logo { display: flex; align-items: center; gap: 0; font-size: 1.05rem; font-weight: 700; white-space: nowrap; }
        .ci-logo .logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--gradient-accent); margin-right: 6px; flex-shrink: 0; }
        .ci-logo .claim { color: var(--primary); }
        .ci-logo .informatics { color: var(--accent-dark); }
        .ci-logo .tm { font-size: 0.55rem; vertical-align: super; color: var(--text-light); margin-left: 1px; }
        .nav-tabs { display: flex; gap: 2px; }
        .nav-tab {
            padding: 6px 14px; border-radius: var(--radius-sm);
            font-size: 0.78rem; font-weight: 500; cursor: pointer;
            background: none; border: none; color: var(--text-muted);
            transition: all 0.2s;
        }
        .nav-tab:hover { background: var(--primary-faint); color: var(--text-main); }
        .nav-tab.active { background: var(--primary); color: #fff; }
        .powered-by { display: flex; flex-direction: column; align-items: flex-end; font-size: 0.55rem; color: var(--text-light); line-height: 1.2; }
        .powered-logo { font-size: 0.7rem; font-weight: 700; }
        .powered-logo .claim { color: #77256C; }
        .powered-logo .informatics { color: #FBB75E; }

        /* ============================================================ PAGE */
        .page-container { max-width: 1440px; margin: 0 auto; padding: 1rem 1.5rem 3rem; }

        .client-header { display: flex; align-items: center; gap: 0.5rem; padding: 0.75rem 0; margin-bottom: 0.25rem; }
        .client-header svg { width: 18px; height: 18px; color: var(--primary); flex-shrink: 0; }
        .client-name { font-size: 1.1rem; font-weight: 700; color: var(--text-main); }
        .client-sub { font-size: 0.75rem; color: var(--text-muted); margin-left: 0.5rem; }

        /* ============================================================ STATS ROW */
        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-md); padding: 1rem 1.1rem;
            box-shadow: var(--shadow-xs); display: flex; flex-direction: column; gap: 0.15rem;
        }
        .stat-card.hero { background: var(--gradient-hero); color: #fff; border: none; box-shadow: var(--shadow-md); }
        .stat-card.hero .stat-label { color: rgba(255,255,255,0.75); }
        .stat-card.hero .stat-sub { color: rgba(255,255,255,0.6); }
        .stat-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
        .stat-value { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
        .stat-sub { font-size: 0.7rem; color: var(--text-light); }

        /* ============================================================ CARDS */
        .card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; box-shadow: var(--shadow-sm); margin-bottom: 1rem; }
        .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; }
        .card-subtitle { font-size: 0.72rem; color: var(--text-muted); font-weight: 400; }
        .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
        .chart-box { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 1.25rem; box-shadow: var(--shadow-sm); }
        .chart-box h3 { font-size: 0.88rem; font-weight: 700; margin-bottom: 1rem; color: var(--text-main); }
        .chart-wrap { height: 280px; position: relative; }

        /* ============================================================ SECTION BAR */
        .section-bar { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .section-bar .label { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-right: 0.25rem; }
        .section-btn { padding: 5px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; cursor: pointer; background: var(--primary-faint); border: 1px solid transparent; color: var(--text-muted); transition: all 0.2s; white-space: nowrap; }
        .section-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .section-btn.active { background: var(--gradient-primary); color: #fff; border-color: transparent; box-shadow: 0 2px 8px rgba(119, 37, 108, 0.25); }

        /* ============================================================ FILTER BAR */
        .filter-bar { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; flex-wrap: wrap; }
        .search-input {
            flex: 1; min-width: 200px; max-width: 340px;
            padding: 0.45rem 0.9rem; border-radius: var(--radius-sm);
            border: 1px solid var(--border-color); font-family: var(--font-main);
            font-size: 0.82rem; background: var(--bg-card); color: var(--text-main);
            outline: none; transition: border-color 0.2s;
        }
        .search-input:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px var(--primary-faint); }
        .filter-select {
            padding: 0.45rem 0.75rem; border-radius: var(--radius-sm);
            border: 1px solid var(--border-color); font-family: var(--font-main);
            font-size: 0.82rem; background: var(--bg-card); color: var(--text-main);
            outline: none; cursor: pointer;
        }
        .filter-select:focus { border-color: var(--primary-light); }

        /* ============================================================ METRICS TABLE */
        .metrics-table { width: 100%; border-collapse: collapse; }
        .metrics-table th {
            text-align: left; padding: 0.6rem 0.85rem;
            font-size: 0.72rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.04em;
            border-bottom: 2px solid var(--border-color);
            background: var(--bg-main); cursor: pointer; user-select: none;
            white-space: nowrap;
        }
        .metrics-table th:hover { color: var(--primary); }
        .metrics-table td { padding: 0.65rem 0.85rem; border-bottom: 1px solid var(--border-color); font-size: 0.82rem; vertical-align: middle; }
        .metrics-table tr:hover td { background: var(--primary-faint); }
        .metrics-table tr:last-child td { border-bottom: none; }
        .sort-arrow { margin-left: 4px; font-size: 0.65rem; color: var(--text-light); }
        .sort-arrow.active { color: var(--primary); }

        /* ============================================================ BADGES */
        .badge { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 0.68rem; font-weight: 700; white-space: nowrap; }
        .badge-pass { background: var(--success-bg); color: var(--success); }
        .badge-warn { background: var(--warning-bg); color: #c47a00; }
        .badge-fail { background: var(--danger-bg); color: var(--danger); }
        .badge-info { background: var(--info-bg); color: var(--info); }
        .badge-core { background: rgba(119,37,108,0.1); color: var(--primary); }
        .badge-prepay { background: rgba(40,178,150,0.1); color: var(--success); }
        .badge-postpay { background: rgba(236,66,115,0.1); color: var(--danger); }
        .badge-financial { background: rgba(251,183,94,0.15); color: #b07000; }
        .badge-datetime { background: rgba(67,155,203,0.1); color: var(--info); }
        .badge-profiler { background: rgba(148,95,141,0.12); color: var(--primary-light); }
        .badge-validation { background: rgba(30,30,60,0.08); color: #4a4a7a; }

        /* ============================================================ EXPAND ROW */
        .expand-row td { padding: 0; }
        .expand-body { padding: 1rem 1.25rem; background: #f8f7fb; border-top: 1px dashed var(--border-color); animation: fadeIn 0.2s ease; }
        .expand-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.75rem; }
        .expand-section h4 { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.5rem; }
        .code-block {
            background: #1a1a2e; color: #e8e0f0; border-radius: var(--radius-sm);
            padding: 0.85rem 1rem; font-family: var(--font-mono); font-size: 0.72rem;
            line-height: 1.7; overflow-x: auto; white-space: pre; max-height: 220px; overflow-y: auto;
        }
        .code-block .kw { color: #FBB75E; }
        .code-block .fn { color: #28B296; }
        .code-block .cm { color: #718096; }
        .code-block .str { color: #f9a8d4; }
        .threshold-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .threshold-chip { padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 600; }
        .threshold-chip.pass { background: var(--success-bg); color: var(--success); }
        .threshold-chip.warn { background: var(--warning-bg); color: #a06000; }
        .threshold-chip.fail { background: var(--danger-bg); color: var(--danger); }
        .expand-meta { display: flex; gap: 1.5rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
        .expand-meta-item { display: flex; flex-direction: column; gap: 2px; }
        .expand-meta-item .label { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
        .expand-meta-item .val { font-size: 0.82rem; font-weight: 600; }
        .expand-toggle { cursor: pointer; background: none; border: none; color: var(--primary); font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: var(--radius-sm); transition: background 0.15s; }
        .expand-toggle:hover { background: var(--primary-faint); }

        /* ============================================================ FIELD REFERENCE TABLE */
        .field-table { width: 100%; border-collapse: collapse; }
        .field-table th { text-align: left; padding: 0.55rem 0.75rem; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 2px solid var(--border-color); background: var(--bg-main); white-space: nowrap; }
        .field-table td { padding: 0.55rem 0.75rem; border-bottom: 1px solid var(--border-color); font-size: 0.78rem; vertical-align: middle; }
        .field-table tr:hover td { background: var(--primary-faint); }
        .field-table tr:last-child td { border-bottom: none; }
        .cat-divider td { background: var(--primary-faint); font-size: 0.7rem; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 0.06em; padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border-color); }
        .mono { font-family: var(--font-mono); font-size: 0.72rem; color: var(--primary); }

        /* ============================================================ MV RULES */
        .mv-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 1rem; }
        .mv-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 1.1rem 1.25rem; box-shadow: var(--shadow-xs); }
        .mv-card-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 0.5rem; gap: 0.5rem; }
        .mv-id { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 700; color: var(--primary); background: var(--primary-faint); padding: 2px 8px; border-radius: var(--radius-sm); flex-shrink: 0; }
        .mv-name { font-size: 0.88rem; font-weight: 700; color: var(--text-main); }
        .mv-def { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.5; }
        .mv-thresholds { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-top: 0.6rem; }

        /* ============================================================ OVERVIEW CATEGORY LIST */
        .cat-summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.75rem; margin-bottom: 1rem; }
        .cat-summary-card { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-md); padding: 0.85rem 1rem; box-shadow: var(--shadow-xs); display: flex; align-items: center; gap: 0.75rem; }
        .cat-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.1rem; flex-shrink: 0; }
        .cat-text .cat-title { font-size: 0.78rem; font-weight: 700; color: var(--text-main); }
        .cat-text .cat-count { font-size: 0.68rem; color: var(--text-muted); }
        .bar-mini { height: 4px; border-radius: 2px; background: var(--border-color); margin-top: 4px; overflow: hidden; }
        .bar-mini-fill { height: 100%; border-radius: 2px; background: var(--gradient-primary); }

        /* ============================================================ FOOTER */
        .portal-footer { text-align: center; padding: 2rem 0 0.5rem; font-size: 0.68rem; color: var(--text-light); border-top: 1px solid var(--border-color); margin-top: 2rem; }

        /* ============================================================ COLUMN EXPLORER */
        .explorer-drop-zone {
            border: 2px dashed var(--border-strong); border-radius: var(--radius-lg);
            padding: 2.5rem 1.5rem; text-align: center; cursor: pointer;
            background: var(--bg-card); transition: all 0.2s; margin-bottom: 1rem;
        }
        .explorer-drop-zone:hover, .explorer-drop-zone.drag-over {
            border-color: var(--primary); background: var(--primary-faint);
        }
        .explorer-drop-zone .drop-icon { font-size: 2.2rem; margin-bottom: 0.5rem; }
        .explorer-drop-zone .drop-title { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }
        .explorer-drop-zone .drop-sub { font-size: 0.75rem; color: var(--text-muted); margin-top: 0.25rem; }
        .explorer-layout {
            display: grid; grid-template-columns: 280px 1fr; gap: 1rem;
            min-height: 520px;
        }
        .explorer-left {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .explorer-left-header {
            padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color);
            background: var(--bg-main);
        }
        .explorer-left-header .panel-title { font-size: 0.78rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
        .explorer-col-search { width: 100%; padding: 0.4rem 0.7rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.78rem; background: var(--bg-card); outline: none; }
        .explorer-col-search:focus { border-color: var(--primary-light); }
        .explorer-col-list { flex: 1; overflow-y: auto; }
        .explorer-col-item {
            padding: 0.5rem 1rem; font-size: 0.8rem; cursor: pointer;
            border-bottom: 1px solid var(--border-color); font-family: var(--font-mono);
            transition: background 0.12s; color: var(--text-main); display: flex; align-items: center; justify-content: space-between;
        }
        .explorer-col-item:hover { background: var(--primary-faint); }
        .explorer-col-item.active { background: var(--primary); color: #fff; font-weight: 600; }
        .explorer-col-item.active .col-item-count { color: rgba(255,255,255,0.7); }
        .col-item-count { font-size: 0.65rem; color: var(--text-light); font-family: var(--font-main); }
        .explorer-right {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .explorer-right-header {
            padding: 0.75rem 1.1rem; border-bottom: 1px solid var(--border-color);
            background: var(--bg-main); display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
        }
        .explorer-col-title { font-size: 1rem; font-weight: 800; color: var(--primary); font-family: var(--font-mono); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .explorer-col-meta { font-size: 0.72rem; color: var(--text-muted); }
        .explorer-val-controls { display: flex; align-items: center; gap: 0.5rem; padding: 0.6rem 1.1rem; border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .explorer-val-search { flex: 1; min-width: 140px; max-width: 280px; padding: 0.38rem 0.7rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.78rem; background: var(--bg-card); outline: none; }
        .explorer-val-search:focus { border-color: var(--primary-light); }
        .sort-toggle-btn { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-muted); transition: all 0.15s; }
        .sort-toggle-btn.active { background: var(--primary); color: #fff; border-color: transparent; }
        .explorer-val-list { flex: 1; overflow-y: auto; }
        .explorer-val-item {
            display: flex; align-items: center; gap: 0.75rem;
            padding: 0.42rem 1.1rem; border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem; transition: background 0.1s;
        }
        .explorer-val-item:hover { background: var(--primary-faint); }
        .explorer-val-item:last-child { border-bottom: none; }
        .val-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); font-size: 0.75rem; color: var(--text-main); }
        .val-text.empty-val { color: var(--text-light); font-style: italic; font-family: var(--font-main); }
        .val-bar-wrap { width: 120px; height: 6px; border-radius: 3px; background: var(--border-color); flex-shrink: 0; overflow: hidden; }
        .val-bar-fill { height: 100%; border-radius: 3px; background: var(--gradient-primary); }
        .val-count-badge { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); width: 52px; text-align: right; flex-shrink: 0; }
        .val-pct-badge { font-size: 0.68rem; color: var(--text-light); width: 40px; text-align: right; flex-shrink: 0; }
        .explorer-empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 3rem; color: var(--text-light); gap: 0.5rem; }
        .explorer-empty-state .empty-icon { font-size: 2.5rem; }
        .explorer-empty-state .empty-msg { font-size: 0.88rem; font-weight: 600; color: var(--text-muted); }
        .explorer-empty-state .empty-sub { font-size: 0.75rem; }
        .explorer-stats-bar { display: flex; gap: 1.25rem; padding: 0.5rem 1.1rem; background: var(--primary-faint); border-bottom: 1px solid var(--border-color); flex-wrap: wrap; }
        .explorer-stat { display: flex; flex-direction: column; gap: 1px; }
        .explorer-stat .e-label { font-size: 0.62rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-muted); }
        .explorer-stat .e-val { font-size: 0.82rem; font-weight: 700; color: var(--text-main); }
        .file-clear-btn { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--danger); transition: all 0.15s; }
        .file-clear-btn:hover { background: var(--danger-bg); border-color: var(--danger); }

        /* ============================================================ FIELD MAPPER */
        .mapper-wrap { display: grid; grid-template-columns: 240px 1fr 280px; gap: 1rem; }
        .mapper-source {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; overflow: hidden; height: fit-content;
            position: sticky; top: 60px;
        }
        .mapper-source-header {
            padding: 0.75rem 1rem; border-bottom: 1px solid var(--border-color);
            background: var(--bg-main);
        }
        .mapper-source-header .panel-title { font-size: 0.72rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.4rem; }
        .mapper-col-list { padding: 0.5rem; display: flex; flex-direction: column; gap: 3px; max-height: 520px; overflow-y: auto; }
        .mapper-col-chip {
            padding: 6px 10px; border-radius: var(--radius-sm);
            font-family: var(--font-mono); font-size: 0.72rem; font-weight: 500;
            cursor: grab; border: 1px solid var(--border-color);
            background: var(--bg-card); color: var(--text-main);
            display: flex; align-items: center; justify-content: space-between; gap: 0.4rem;
            transition: all 0.15s; user-select: none;
        }
        .mapper-col-chip:hover { border-color: var(--primary-light); background: var(--primary-faint); }
        .mapper-col-chip.mapped { border-color: var(--success); background: rgba(40,178,150,0.07); color: var(--success); }
        .mapper-col-chip.dragging { opacity: 0.4; }
        .mapper-col-chip.selected { border-color: var(--primary); background: var(--primary-faint); color: var(--primary); font-weight: 700; box-shadow: 0 0 0 2px var(--primary-faint); }
        .mapper-col-chip.selected.mapped { border-color: var(--primary); color: var(--primary); }
        .mapper-col-chip .chip-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .mapper-col-chip.mapped .chip-dot { background: var(--success); }
        .mapper-col-chip:not(.mapped) .chip-dot { background: var(--border-strong); }
        .mapper-table-wrap { background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); overflow: hidden; }
        .mapper-table { width: 100%; border-collapse: collapse; }
        .mapper-table th {
            text-align: left; padding: 0.6rem 0.9rem;
            font-size: 0.7rem; font-weight: 700; color: var(--text-muted);
            text-transform: uppercase; letter-spacing: 0.04em;
            border-bottom: 2px solid var(--border-color); background: var(--bg-main);
            white-space: nowrap;
        }
        .mapper-table td { padding: 0.4rem 0.75rem; border-bottom: 1px solid var(--border-color); vertical-align: middle; font-size: 0.8rem; }
        .mapper-table tr:last-child td { border-bottom: none; }
        .mapper-row { transition: background 0.12s; }
        .mapper-row:hover td { background: var(--primary-faint); }
        .mapper-row.drop-target td { background: rgba(119,37,108,0.12); outline: 2px dashed var(--primary); outline-offset: -2px; }
        .mapper-row.mapped-row td { background: rgba(40,178,150,0.04); }
        .mapper-client-cell { min-width: 200px; }
        .mapper-drop-zone {
            border: 1.5px dashed var(--border-color); border-radius: var(--radius-sm);
            padding: 5px 10px; font-size: 0.75rem; color: var(--text-light);
            background: var(--bg-main); cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 0.4rem; min-height: 32px;
        }
        .mapper-drop-zone.has-value { border-color: var(--success); background: rgba(40,178,150,0.07); color: var(--success); font-weight: 600; }
        .mapper-drop-zone.drag-over { border-color: var(--primary); background: var(--primary-faint); color: var(--primary); }
        .mapper-select { width: 100%; padding: 4px 6px; border: 1.5px solid var(--border-color); border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.75rem; background: var(--bg-card); color: var(--text-main); outline: none; cursor: pointer; }
        .mapper-select:focus { border-color: var(--primary-light); }
        .mapper-select.has-value { border-color: var(--success); color: var(--success); font-weight: 600; background: rgba(40,178,150,0.05); }
        .mapper-ci-field { font-size: 0.8rem; color: var(--text-main); }
        .mapper-arrow { font-size: 0.85rem; color: var(--text-light); padding: 0 0.25rem; text-align: center; width: 32px; }
        .mapper-arrow.mapped { color: var(--success); }
        .mapper-clear-btn { background: none; border: none; color: var(--text-light); cursor: pointer; font-size: 0.7rem; padding: 2px 4px; border-radius: 3px; flex-shrink: 0; }
        .mapper-clear-btn:hover { color: var(--danger); background: var(--danger-bg); }
        .mapper-stats { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .mapper-stat-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.72rem; font-weight: 700; }
        .mapper-stat-pill.total   { background: var(--primary-faint); color: var(--primary); }
        .mapper-stat-pill.done    { background: var(--success-bg); color: var(--success); }
        .mapper-stat-pill.pending { background: var(--warning-bg); color: #a06000; }
        .mapper-vals-panel {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: var(--radius-lg); box-shadow: var(--shadow-sm);
            display: flex; flex-direction: column; overflow: hidden;
            position: sticky; top: 60px; max-height: 680px;
        }
        .mapper-vals-list { overflow-y: auto; padding: 0.35rem 0.5rem; display: flex; flex-direction: column; gap: 1px; flex: 1; min-height: 0; }
        .mapper-val-row { display: flex; align-items: center; gap: 0.4rem; padding: 5px 6px; border-bottom: 1px solid var(--border-color); font-size: 0.75rem; }
        .mapper-val-row:last-child { border-bottom: none; }
        .mapper-val-row:hover { background: var(--primary-faint); }
        .mapper-val-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); color: var(--text-main); }
        .mapper-val-count { font-size: 0.68rem; color: var(--text-muted); flex-shrink: 0; min-width: 36px; text-align: right; font-weight: 600; }
        .mapper-val-bar-wrap { width: 50px; flex-shrink: 0; height: 5px; background: var(--border-color); border-radius: 3px; overflow: hidden; }
        .mapper-val-bar { height: 100%; background: var(--primary-light); border-radius: 3px; }
        .mapper-vals-empty { padding: 2.5rem 1.5rem; text-align: center; color: var(--text-light); font-size: 0.8rem; }

        /* ============================================================ RESPONSIVE */
        @media (max-width: 768px) {
            .chart-row { grid-template-columns: 1fr; }
            .expand-grid { grid-template-columns: 1fr; }
            .mv-grid { grid-template-columns: 1fr; }
            .nav-tabs { display: none; }
            .cat-summary-grid { grid-template-columns: 1fr 1fr; }
            .explorer-layout { grid-template-columns: 1fr; }
            .mapper-wrap { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useEffect, useCallback } = React;

// ============================================================
// DATA — CI Standard Calculations v3.2
// ============================================================
const METRICS = [
  // ---- CORE METRICS ----
  { id:'CM-1', category:'Core', name:'Number of Employees', pbiVisual:'Card',
    definition:'Count of distinct employees/members in the claim data.',
    sql:`SELECT COUNT(DISTINCT\n    COALESCE(cl_memid, cl_eessn,\n        CONCAT(cl_eefn, cl_eeln, cl_eedob)))\nFROM claim cl\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Employee Count =\nCALCULATE(\n    DISTINCTCOUNT(Claim[cl_memid]),\n    Claim[cl_ci_ignore] = 0\n        || ISBLANK(Claim[cl_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },
  { id:'CM-2', category:'Core', name:'Number of Patients', pbiVisual:'Card',
    definition:'Count of distinct patients across all claims.',
    sql:`SELECT COUNT(DISTINCT\n    COALESCE(cl_ptid, cl_ptssn, cl_ptacctno,\n        CONCAT(cl_ptfn, cl_ptln, cl_ptdob)))\nFROM claim cl\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Patient Count =\nCALCULATE(\n    DISTINCTCOUNT(Claim[cl_ptid]),\n    Claim[cl_ci_ignore] = 0\n        || ISBLANK(Claim[cl_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },
  { id:'CM-3', category:'Core', name:'Claim Count', pbiVisual:'Card',
    definition:'Total number of distinct claims.',
    sql:`SELECT COUNT(DISTINCT cl.cl_claimid)\nFROM claim cl\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Claim Count =\nCALCULATE(\n    DISTINCTCOUNT(Claim[cl_claimid]),\n    Claim[cl_ci_ignore] = 0\n        || ISBLANK(Claim[cl_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },
  { id:'CM-4', category:'Core', name:'Claimline Count', pbiVisual:'Card',
    definition:'Total number of service lines across all claims.',
    sql:`SELECT COUNT(*)\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Claimline Count =\nCALCULATE(\n    COUNTROWS(Claimline),\n    FILTER(Claimline,\n        Claimline[ln_ci_ignore] = 0\n        || ISBLANK(Claimline[ln_ci_ignore])),\n    FILTER(RELATEDTABLE(Claim),\n        Claim[cl_ci_ignore] = 0\n        || ISBLANK(Claim[cl_ci_ignore]))\n)`,
    thresholds:null, status:'Implemented' },
  { id:'CM-5', category:'Core', name:'Total Paid / Total Spend', pbiVisual:'Card (currency)',
    definition:'Sum of all paid amounts across claim lines.',
    sql:`SELECT SUM(ln.ln_paid)\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Total Paid =\nCALCULATE(\n    SUM(Claimline[ln_paid]),\n    Claimline[ln_ci_ignore] = 0\n        || ISBLANK(Claimline[ln_ci_ignore]),\n    FILTER(RELATEDTABLE(Claim),\n        Claim[cl_ci_ignore] = 0\n        || ISBLANK(Claim[cl_ci_ignore]))\n)`,
    thresholds:null, status:'Implemented' },
  { id:'CM-6', category:'Core', name:'Scope Begin Paid Date', pbiVisual:'Card (date)',
    definition:'Earliest payment date in the dataset.',
    sql:`SELECT MIN(ln.ln_datepaid)\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Scope Begin Date =\nCALCULATE(\n    MIN(Claimline[ln_datepaid]),\n    Claimline[ln_ci_ignore] = 0\n        || ISBLANK(Claimline[ln_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },
  { id:'CM-7', category:'Core', name:'Scope End Paid Date', pbiVisual:'Card (date)',
    definition:'Latest payment date in the dataset.',
    sql:`SELECT MAX(ln.ln_datepaid)\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Scope End Date =\nCALCULATE(\n    MAX(Claimline[ln_datepaid]),\n    Claimline[ln_ci_ignore] = 0\n        || ISBLANK(Claimline[ln_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },

  // ---- PRE-PAY METRICS ----
  { id:'PP-1', category:'Pre-Pay', name:'Pre-Pay Savings Identified', pbiVisual:'Card (currency)',
    definition:'Total savings identified through pre-payment review.',
    sql:`SELECT SUM(ln.ln_savings_identified)\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND cl.cl_service_type = 'Pre-Payment'\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`PrePay Savings =\nCALCULATE(\n    SUM(Claimline[ln_savings_identified]),\n    Claim[cl_service_type] = "Pre-Payment",\n    Claimline[ln_ci_ignore] = 0\n        || ISBLANK(Claimline[ln_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },
  { id:'PP-2', category:'Pre-Pay', name:'Pre-Pay Savings Rate', pbiVisual:'Gauge / KPI',
    definition:'Percentage of analyzed spend that resulted in savings.',
    sql:`SELECT\n    CASE\n        WHEN SUM(ln.ln_charged) > 0\n        THEN (SUM(ln.ln_savings_identified)\n            / SUM(ln.ln_charged)) * 100\n        ELSE 0\n    END AS savings_rate\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND cl.cl_service_type = 'Pre-Payment'\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`PrePay Savings Rate =\nVAR TotalCharged = [PrePay Total Charged]\nVAR TotalSavings = [PrePay Savings]\nRETURN\n    IF(TotalCharged > 0,\n        DIVIDE(TotalSavings, TotalCharged, 0) * 100,\n        0\n    )`,
    thresholds:null, status:'Implemented' },
  { id:'PP-3', category:'Pre-Pay', name:'Average Savings Per Claim', pbiVisual:'Card (currency)',
    definition:'Average savings amount per claim.',
    sql:`SELECT\n    CASE\n        WHEN COUNT(DISTINCT cl.cl_claimid) > 0\n        THEN SUM(ln.ln_savings_identified)\n            / COUNT(DISTINCT cl.cl_claimid)\n        ELSE 0\n    END\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND cl.cl_service_type = 'Pre-Payment'\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Avg Savings Per Claim =\nDIVIDE(\n    [PrePay Savings],\n    [PrePay Claim Count],\n    0\n)`,
    thresholds:null, status:'Implemented' },
  { id:'PP-4', category:'Pre-Pay', name:'Pre-Pay Total Charged', pbiVisual:'Card (currency)',
    definition:'Total billed/charged amount for pre-payment review claims.',
    sql:`SELECT SUM(ln.ln_charged)\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND cl.cl_service_type = 'Pre-Payment'\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`PrePay Total Charged =\nCALCULATE(\n    SUM(Claimline[ln_charged]),\n    Claim[cl_service_type] = "Pre-Payment",\n    Claimline[ln_ci_ignore] = 0\n        || ISBLANK(Claimline[ln_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },
  { id:'PP-5', category:'Pre-Pay', name:'Pre-Pay Claim Count', pbiVisual:'Card',
    definition:'Count of distinct claims submitted for pre-payment review.',
    sql:`SELECT COUNT(DISTINCT cl.cl_claimid)\nFROM claim cl\nWHERE cl.cl_clientpk = :clientpk\n  AND cl.cl_service_type = 'Pre-Payment'\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`PrePay Claim Count =\nCALCULATE(\n    DISTINCTCOUNT(Claim[cl_claimid]),\n    Claim[cl_service_type] = "Pre-Payment",\n    Claim[cl_ci_ignore] = 0\n        || ISBLANK(Claim[cl_ci_ignore])\n)`,
    thresholds:null, status:'Implemented' },

  // ---- POST-PAY METRICS ----
  { id:'POST-1', category:'Post-Pay', name:'Total Overpayments Identified', pbiVisual:'Card (currency)',
    definition:'Sum of overpayments identified in post-payment review.',
    sql:`SELECT SUM(r.recovery_amount)\nFROM recovery r\nJOIN claim cl ON r.cl_claimid = cl.cl_claimid\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Total Overpayments =\nCALCULATE(\n    SUM(Recovery[recovery_amount]),\n    FILTER(\n        RELATEDTABLE(Claim),\n        Claim[cl_ci_ignore] = 0\n            || ISBLANK(Claim[cl_ci_ignore])\n    )\n)`,
    thresholds:null, status:'Implemented' },
  { id:'POST-2', category:'Post-Pay', name:'Total Recovered', pbiVisual:'Card (currency)',
    definition:'Sum of amounts actually recovered from overpayments.',
    sql:`SELECT SUM(rp.payment_amount)\nFROM recovery r\nJOIN recovery_payment rp ON r.recovery_id = rp.recovery_id\nJOIN claim cl ON r.cl_claimid = cl.cl_claimid\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Total Recovered =\nCALCULATE(\n    SUM(Recovery_Payment[payment_amount]),\n    FILTER(RELATEDTABLE(Recovery),\n        NOT(ISBLANK(RELATED(Claim[cl_claimid])))),\n    FILTER(RELATEDTABLE(Claim),\n        Claim[cl_ci_ignore] = 0\n            || ISBLANK(Claim[cl_ci_ignore]))\n)`,
    thresholds:null, status:'Implemented' },
  { id:'POST-3', category:'Post-Pay', name:'Recovery Rate', pbiVisual:'Gauge / KPI',
    definition:'Percentage of identified overpayments that were recovered.',
    sql:`SELECT\n    CASE\n        WHEN SUM(r.recovery_amount) > 0\n        THEN (SUM(rp.payment_amount)\n            / SUM(r.recovery_amount)) * 100\n        ELSE 0\n    END AS recovery_rate\nFROM recovery r\nLEFT JOIN recovery_payment rp\n    ON r.recovery_id = rp.recovery_id\nJOIN claim cl ON r.cl_claimid = cl.cl_claimid\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Recovery Rate =\nVAR TotalIdentified = [Total Overpayments]\nVAR TotalRecovered  = [Total Recovered]\nRETURN\n    IF(TotalIdentified > 0,\n        DIVIDE(TotalRecovered, TotalIdentified, 0) * 100,\n        0\n    )`,
    thresholds:null, status:'Implemented' },
  { id:'POST-4', category:'Post-Pay', name:'Average Days to Recovery', pbiVisual:'Card',
    definition:'Average number of days between identification and recovery.',
    sql:`SELECT AVG(DATEDIFF(rp.payment_date, r.identified_date))\nFROM recovery r\nJOIN recovery_payment rp ON r.recovery_id = rp.recovery_id\nJOIN claim cl ON r.cl_claimid = cl.cl_claimid\nWHERE cl.cl_clientpk = :clientpk\n  AND rp.payment_date IS NOT NULL\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Avg Days to Recovery =\nAVERAGEX(\n    FILTER(Recovery_Payment,\n        NOT(ISBLANK(Recovery_Payment[payment_date]))),\n    DATEDIFF(\n        RELATED(Recovery[identified_date]),\n        Recovery_Payment[payment_date],\n        DAY\n    )\n)`,
    thresholds:null, status:'Implemented' },
  { id:'POST-5', category:'Post-Pay', name:'Outstanding Recoveries', pbiVisual:'Card (currency)',
    definition:'Amount of identified overpayments not yet recovered.',
    sql:`SELECT SUM(r.recovery_amount)\n    - COALESCE(SUM(rp.payment_amount), 0)\nFROM recovery r\nLEFT JOIN recovery_payment rp\n    ON r.recovery_id = rp.recovery_id\nJOIN claim cl ON r.cl_claimid = cl.cl_claimid\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0;`,
    dax:`Outstanding Recoveries =\n[Total Overpayments] - [Total Recovered]`,
    thresholds:null, status:'Implemented' },

  // ---- FINANCIAL ----
  { id:'FIN-1', category:'Financial', name:'PMPM (Per Member Per Month)', pbiVisual:'Card (currency)',
    definition:'Average cost per member per month.',
    sql:`SELECT SUM(ln.ln_paid) /\n    (COUNT(DISTINCT cl.cl_memid) *\n     (DATEDIFF(MAX(ln.ln_datepaid),\n              MIN(ln.ln_datepaid)) / 30.44))\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`PMPM =\nVAR TotalPaid    = [Total Paid]\nVAR MemberCount  = [Employee Count]\nVAR MonthsInScope =\n    DATEDIFF([Scope Begin Date],\n             [Scope End Date], MONTH) + 1\nRETURN\n    IF(MemberCount > 0 && MonthsInScope > 0,\n        DIVIDE(TotalPaid,\n               MemberCount * MonthsInScope, 0),\n        0\n    )`,
    thresholds:null, status:'Implemented' },
  { id:'FIN-2', category:'Financial', name:'PPPM (Per Patient Per Month)', pbiVisual:'Card (currency)',
    definition:'Average cost per patient per month.',
    sql:`SELECT SUM(ln.ln_paid) /\n    (COUNT(DISTINCT cl.cl_ptid) *\n     (DATEDIFF(MAX(ln.ln_datepaid),\n              MIN(ln.ln_datepaid)) / 30.44))\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`PPPM =\nVAR TotalPaid    = [Total Paid]\nVAR PatientCount = [Patient Count]\nVAR MonthsInScope =\n    DATEDIFF([Scope Begin Date],\n             [Scope End Date], MONTH) + 1\nRETURN\n    IF(PatientCount > 0 && MonthsInScope > 0,\n        DIVIDE(TotalPaid,\n               PatientCount * MonthsInScope, 0),\n        0\n    )`,
    thresholds:null, status:'Implemented' },
  { id:'FIN-3', category:'Financial', name:'Month-over-Month Variance', pbiVisual:'KPI (trend)',
    definition:'Percentage change in total paid from the previous month.',
    sql:null,
    dax:`MoM Variance % =\nVAR CurrentMonth  = [Total Paid]\nVAR PreviousMonth =\n    CALCULATE(\n        [Total Paid],\n        DATEADD(Calendar[Date], -1, MONTH)\n    )\nRETURN\n    IF(PreviousMonth > 0,\n        DIVIDE(CurrentMonth - PreviousMonth,\n               PreviousMonth, 0) * 100,\n        0\n    )`,
    thresholds:null, status:'Implemented' },
  { id:'FIN-4', category:'Financial', name:'Year-over-Year Variance', pbiVisual:'KPI (trend)',
    definition:'Percentage change from the same period in the prior year.',
    sql:null,
    dax:`YoY Variance % =\nVAR CurrentPeriod = [Total Paid]\nVAR PriorYear =\n    CALCULATE(\n        [Total Paid],\n        SAMEPERIODLASTYEAR(Calendar[Date])\n    )\nRETURN\n    IF(PriorYear > 0,\n        DIVIDE(CurrentPeriod - PriorYear,\n               PriorYear, 0) * 100,\n        0\n    )`,
    thresholds:null, status:'Implemented' },
  { id:'FIN-5', category:'Financial', name:'Average Paid Per Claim', pbiVisual:'Card (currency)',
    definition:'Average payment amount per distinct claim.',
    sql:`SELECT CASE\n    WHEN COUNT(DISTINCT cl.cl_claimid) > 0\n    THEN SUM(ln.ln_paid)\n        / COUNT(DISTINCT cl.cl_claimid)\n    ELSE 0\nEND\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Avg Paid Per Claim =\nDIVIDE([Total Paid], [Claim Count], 0)`,
    thresholds:null, status:'Implemented' },
  { id:'FIN-6', category:'Financial', name:'Average Paid Per Claimline', pbiVisual:'Card (currency)',
    definition:'Average payment amount per service line.',
    sql:`SELECT CASE\n    WHEN COUNT(*) > 0\n    THEN SUM(ln.ln_paid) / COUNT(*)\n    ELSE 0\nEND\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Avg Paid Per Claimline =\nDIVIDE([Total Paid], [Claimline Count], 0)`,

  // ---- DATE & TIME ----
  { id:'DT-1', category:'Date & Time', name:'Claims by Month', pbiVisual:'Line / Clustered Column',
    definition:'Monthly aggregation of claims and payments.',
    sql:`SELECT\n    DATE_FORMAT(ln.ln_datepaid, '%Y-%m') AS month,\n    COUNT(DISTINCT cl.cl_claimid) AS claim_count,\n    SUM(ln.ln_paid) AS total_paid\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0\nGROUP BY DATE_FORMAT(ln.ln_datepaid, '%Y-%m')\nORDER BY month;`,
    dax:`-- Use Calendar table grouped by YearMonth\n-- with [Total Paid] and [Claim Count] measures`,

  { id:'DT-2', category:'Date & Time', name:'Claims by Quarter', pbiVisual:'Bar / Line',
    definition:'Quarterly aggregation of claims and payments.',
    sql:`SELECT\n    CONCAT(YEAR(ln.ln_datepaid), '-Q',\n        QUARTER(ln.ln_datepaid)) AS quarter,\n    COUNT(DISTINCT cl.cl_claimid) AS claim_count,\n    SUM(ln.ln_paid) AS total_paid\nFROM claim cl\nJOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE ln.ln_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0\nGROUP BY YEAR(ln.ln_datepaid), QUARTER(ln.ln_datepaid)\nORDER BY quarter;`,

    thresholds:null, status:'Implemented' },

  // ---- FIELD PROFILER ----
  { id:'FP-1', category:'Field Profiler', name:'Field Completeness %', pbiVisual:'Data bar (matrix)',
    definition:'Percentage of non-null, non-empty values for a single column across all claimlines.',
    sql:`SELECT\n    'column_name' AS field_name,\n    COUNT(*) AS total_rows,\n    COUNT(column_name) AS filled_count,\n    SUM(CASE WHEN column_name IS NULL\n        OR TRIM(column_name::text) = ''\n        THEN 1 ELSE 0 END) AS null_count,\n    ROUND(\n        COUNT(column_name)::numeric\n        / COUNT(*)::numeric, 4\n    ) AS pct_filled\nFROM claim cl\nJOIN claimline ln ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0;`,
    dax:`Field Completeness % =\nDIVIDE(\n    COUNTROWS(FILTER(Data,\n        NOT(ISBLANK(Data[SelectedColumn]))\n        && (Data[cl_ci_ignore] = 0\n            || ISBLANK(Data[cl_ci_ignore])))),\n    COUNTROWS(FILTER(Data,\n        Data[cl_ci_ignore] = 0\n        || ISBLANK(Data[cl_ci_ignore]))),\n    0\n)`,
    thresholds:[{label:'≥90% — Pass',cls:'pass'},{label:'50–90% — Warn',cls:'warn'},{label:'<50% — Fail',cls:'fail'}],
    status:'Implemented' },
  { id:'FP-2', category:'Field Profiler', name:'Top Value Distribution', pbiVisual:'Horizontal bar (drillthrough)',
    definition:'Top 30 most frequent values with frequency counts and percentage of total rows.',
    sql:`SELECT column_name AS value,\n    COUNT(*) AS frequency,\n    ROUND(COUNT(*)::numeric /\n        (SELECT COUNT(*) FROM claim cl\n         JOIN claimline ln\n             ON cl.cl_claimid = ln.ln_claimid\n             AND cl.cl_clientpk = ln.ln_clientpk\n         WHERE cl.cl_clientpk = :clientpk\n             AND COALESCE(cl.cl_ci_ignore, 0) = 0\n             AND COALESCE(ln.ln_ci_ignore, 0) = 0\n        )::numeric, 4) AS pct_of_total\nFROM claim cl JOIN claimline ln\n    ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0\n  AND column_name IS NOT NULL\nGROUP BY 1 ORDER BY 2 DESC LIMIT 30;`,
    dax:`Value Frequency =\nCALCULATE(\n    COUNTROWS(Data),\n    Data[cl_ci_ignore] = 0\n        || ISBLANK(Data[cl_ci_ignore])\n)\n-- Used in matrix grouped by column value`,
    thresholds:null, status:'Implemented' },
  { id:'FP-3', category:'Field Profiler', name:'Distinct Value Count', pbiVisual:'Numeric column (matrix)',
    definition:'Count of unique non-null values in a column.',
    sql:`SELECT COUNT(DISTINCT column_name) AS distinct_count\nFROM claim cl\nJOIN claimline ln ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0\n  AND column_name IS NOT NULL\n  AND TRIM(column_name::text) <> '';`,
    dax:`Distinct Value Count =\nCALCULATE(\n    DISTINCTCOUNT(Data[SelectedColumn]),\n    Data[cl_ci_ignore] = 0\n        || ISBLANK(Data[cl_ci_ignore])\n)`,

  { id:'FP-4', category:'Field Profiler', name:'Cardinality Ratio', pbiVisual:'% column (matrix)',
    definition:'Distinct values / filled count. High (>50%) = unique identifiers; low (<1%) = categorical.',
    sql:`SELECT\n    COUNT(DISTINCT column_name)::numeric /\n    NULLIF(COUNT(column_name), 0)::numeric\n        AS cardinality_ratio\nFROM claim cl\nJOIN claimline ln ON cl.cl_claimid = ln.ln_claimid\n    AND cl.cl_clientpk = ln.ln_clientpk\nWHERE cl.cl_clientpk = :clientpk\n  AND COALESCE(cl.cl_ci_ignore, 0) = 0\n  AND COALESCE(ln.ln_ci_ignore, 0) = 0\n  AND column_name IS NOT NULL;`,
    dax:`Cardinality Ratio =\nDIVIDE(\n    DISTINCTCOUNT(Data[SelectedColumn]),\n    COUNTROWS(FILTER(Data,\n        NOT(ISBLANK(Data[SelectedColumn])))),\n    0\n)`,
    thresholds:[{label:'>50% — High (ID fields)',cls:'pass'},{label:'1–50% — Medium',cls:'warn'},{label:'<1% — Low (categorical)',cls:'fail'}],
    status:'Implemented' },
  { id:'FP-5', category:'Field Profiler', name:'Weighted Overall Completeness', pbiVisual:'Hero card',
    definition:'Total filled cells / total possible cells across all profiled columns. True weighted average.',
    sql:`WITH field_stats AS (\n    SELECT 'field_name', COUNT(*), COUNT(field)\n    FROM claim cl JOIN claimline ln\n        ON cl.cl_claimid = ln.ln_claimid\n    WHERE cl.cl_clientpk = :clientpk\n        AND COALESCE(cl.cl_ci_ignore, 0) = 0\n        AND COALESCE(ln.ln_ci_ignore, 0) = 0\n    -- UNION ALL for each column ...\n)\nSELECT\n    SUM(filled_count) AS total_filled_cells,\n    SUM(total_rows)   AS total_possible_cells,\n    ROUND(SUM(filled_count)::numeric /\n        NULLIF(SUM(total_rows), 0)::numeric, 4\n    ) AS weighted_completeness\nFROM field_stats;`,
    dax:`Weighted Completeness =\nVAR TotalCells  = COUNTROWS(Data) * [Column Count]\nVAR FilledCells =\n    SUMX(\n        FieldMetadata,\n        CALCULATE(\n            COUNTROWS(FILTER(Data,\n                NOT(ISBLANK(Data[CurrentField]))\n            ))\n        )\n    )\nRETURN DIVIDE(FilledCells, TotalCells, 0)`,
    thresholds:[{label:'≥90% — Pass',cls:'pass'},{label:'50–90% — Warn',cls:'warn'},{label:'<50% — Fail',cls:'fail'}],

  { id:'FP-6', category:'Field Profiler', name:'Category Completeness Summary', pbiVisual:'Matrix / Small multiples',
    definition:'Average completeness across all fields within a functional category (15 categories, 93 fields).',
    sql:`SELECT category, AVG(pct_filled) AS avg_completeness,\n    COUNT(*) AS field_count\nFROM category_fields cf\nCROSS JOIN LATERAL unnest(cf.fields) AS f(field_name)\nJOIN field_completeness_stats fs\n    ON fs.field_name = f.field_name\nGROUP BY 1 ORDER BY 2 DESC;`,
    dax:`Category Completeness =\nAVERAGEX(\n    FILTER(FieldMetadata,\n        FieldMetadata[Category] =\n            SELECTEDVALUE(Categories[CategoryName])\n    ),\n    [Field Completeness %]\n)`,

  { id:'FP-7', category:'Field Profiler', name:'Completeness Classification Band', pbiVisual:'Filter chips / slicer',
    definition:'Categorizes each field completeness into actionable bands.',
    sql:null,
    dax:`Completeness Band =\nSWITCH(TRUE(),\n    [Field Completeness %] >= 0.99, "Complete",\n    [Field Completeness %] >= 0.50, "Partial",\n    [Field Completeness %] >  0,   "Sparse",\n    "Empty"\n)`,

    status:'Implemented' },

// Helper: profile every column in the loaded file
function profileColumns(headers, rows) {
  const hLen = headers.length;
  const total = rows.length;
  const filled    = new Int32Array(hLen);
  const numCount  = new Int32Array(hLen);
  const dateCount = new Int32Array(hLen);
  const distinct  = headers.map(() => new Set());
  // Type detection on a sample to keep it fast for large files
  const SAMPLE = Math.min(total, 5000);
  const numRx  = /^-?[\d,$.]+$/;
  const dateRx = /^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}|^\d{4}-\d{2}-\d{2}/;
  // Single pass — all columns at once
  for (let i = 0; i < total; i++) {
    const row = rows[i];
    for (let j = 0; j < hLen; j++) {
      const val = row[headers[j]];
      if (val && val !== '') {
        filled[j]++;
        if (distinct[j].size < 10000) distinct[j].add(val);
        if (i < SAMPLE) {
          if (numRx.test(val)) numCount[j]++;
          else if (dateRx.test(val)) dateCount[j]++;
        }
      }
    }
  }
  return headers.map((col, j) => {
    const f = filled[j];
    const pctFilled = total > 0 ? f / total : 0;
    let dataType = 'Text';
    if (f === 0) dataType = 'Empty';
    else if (numCount[j] / Math.min(f, SAMPLE) >= 0.8) dataType = 'Numeric';
    else if (dateCount[j] / Math.min(f, SAMPLE) >= 0.7) dataType = 'Date';
    else if (numCount[j] / Math.min(f, SAMPLE) >= 0.3) dataType = 'Mixed';
    return { column: col, count: total, filledCount: f, nullCount: total - f,
             pctFilled, pctEmpty: 1 - pctFilled, distinctCount: distinct[j].size, dataType };
  });
}

function Overview({ onNav, fileData, onLoad }) {
  const [dragOver, setDragOver] = useState(false);
  const fileRef = useRef(null);
  const DELIM_LABELS = { ',': 'comma', '\t': 'tab', '|': 'pipe', ';': 'semicolon' };
  const [loadStatus, setLoadStatus] = useState(null); // null | { done, total, currentName, phase }

  const handleFiles = useCallback((fileList) => {
    if (!fileList || fileList.length === 0) return;
    const files = Array.from(fileList).filter(f => /\.(csv|tsv|txt)$/i.test(f.name));
    if (files.length === 0) return;

    const results = new Array(files.length);
    let done = 0;
    setLoadStatus({ done: 0, total: files.length, currentName: files[0].name, phase: 'reading' });

    files.forEach((file, idx) => {
      const reader = new FileReader();
      reader.onload = e => {
        results[idx] = e.target.result;
        done++;
        if (done < files.length) {
          setLoadStatus({ done, total: files.length, currentName: files[done]?.name || '', phase: 'reading' });
          return;
        }

        // Parse each file in async chunks — never blocks the browser.
        let firstParsed = null; // first successfully parsed file (gives us headers + delim)
        let allRows = [];
        let fileIdx = 0;

        const parseNextFile = () => {
          if (fileIdx >= results.length) {
            setLoadStatus(null);
            if (!firstParsed) {
              alert('No data could be read from the selected files.\n\nMake sure they are plain-text CSV/TSV/TXT files and try again.');
              return;
            }
            const name = files.length === 1 ? files[0].name : `${files.length} files combined`;
            onLoad({ headers: firstParsed.headers, rows: allRows, delim: firstParsed.delim }, name, files.map(f => f.name));
            return;
          }
          const fi = fileIdx;
          setLoadStatus({ fileIdx: fi, total: files.length, currentName: files[fi].name, phase: 'parsing', rowsDone: 0, rowsTotal: 1 });
          parseCSVChunked(
            results[fi],
            (rowsDone, rowsTotal) => {
              setLoadStatus({ fileIdx: fi, total: files.length, currentName: files[fi].name, phase: 'parsing', rowsDone, rowsTotal });
            },
            (parsed) => {
              if (parsed && parsed.headers.length) {
                if (!firstParsed) {
                  // first good file — use its headers and delimiter
                  firstParsed = parsed;
                  allRows = parsed.rows.slice();
                } else {
                  // subsequent files — append rows only
                  const pr = parsed.rows;
                  for (let j = 0; j < pr.length; j++) allRows.push(pr[j]);
                }
              }
              fileIdx++;
              parseNextFile();
            }
          );
        };
        parseNextFile();
      };
      reader.readAsText(file);
    });
  }, [onLoad]);

  const profiles = useMemo(() =>
    fileData.rows.length ? profileColumns(fileData.headers, fileData.rows) : []
  , [fileData.headers, fileData.rows]);

  const dataStats = useMemo(() => {
    if (!profiles.length) return null;
    const complete = profiles.filter(p => p.pctFilled >= 0.99).length;
    const partial  = profiles.filter(p => p.pctFilled >= 0.5 && p.pctFilled < 0.99).length;
    const sparse   = profiles.filter(p => p.pctFilled > 0 && p.pctFilled < 0.5).length;
    const empty    = profiles.filter(p => p.pctFilled === 0).length;
    const totalCells  = profiles.reduce((s, p) => s + p.count, 0);
    const filledCells = profiles.reduce((s, p) => s + p.filledCount, 0);
    const weightedPct = totalCells > 0 ? filledCells / totalCells : 0;
    const numericCols = profiles.filter(p => p.dataType === 'Numeric');
    return { complete, partial, sparse, empty, weightedPct, numericCols };
  }, [profiles]);

  const numericTotals = useMemo(() => {
    if (!dataStats) return [];
    return dataStats.numericCols.slice(0, 8).map(p => {
      let total = 0, count = 0, min = Infinity, max = -Infinity;
      fileData.rows.forEach(row => {
        const n = parseFloat(String(row[p.column] ?? '').replace(/[$,\s]/g, ''));
        if (!isNaN(n)) { total += n; count++; if (n < min) min = n; if (n > max) max = n; }
      });
      return { col: p.column, total, avg: count > 0 ? total / count : 0, min: count > 0 ? min : 0, max: count > 0 ? max : 0, count };
    });
  }, [dataStats, fileData.rows]);

  const fmtN = n => n == null ? '—' : Math.abs(n) >= 1e6
    ? '$' + (n / 1e6).toFixed(2) + 'M'
    : '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const hasFile = fileData.headers.length > 0;

  return (
    <div>
      {/* ── LOADING PROGRESS ── */}
      {loadStatus && (
        <div style={{
          background:'var(--bg-card)', border:'1px solid var(--border-color)',
          borderRadius:'var(--radius-lg)', padding:'2rem 2.5rem',
          marginBottom:'1.25rem', boxShadow:'var(--shadow-sm)',
          display:'flex', flexDirection:'column', alignItems:'center', gap:'1rem'
        }}>
          <div style={{fontSize:'0.95rem',fontWeight:700,color:'var(--text-main)'}}>
            {loadStatus.phase === 'parsing'
              ? `Parsing file ${(loadStatus.fileIdx || 0) + 1} of ${loadStatus.total} — ${loadStatus.currentName}`
              : `Reading file ${(loadStatus.done || 0) + 1} of ${loadStatus.total}…`}
          </div>
          {loadStatus.currentName && (
            <div style={{fontSize:'0.75rem',color:'var(--text-muted)',fontFamily:'var(--font-mono)'}}>{loadStatus.currentName}</div>
          )}
          {/* progress bar */}
          <div style={{width:'100%',maxWidth:480,height:8,background:'var(--border-color)',borderRadius:4,overflow:'hidden'}}>
            <div style={{
              height:'100%', borderRadius:4,
              background:'linear-gradient(90deg, var(--primary), var(--primary-light))',
              transition:'width 0.2s ease',
              width: loadStatus.phase === 'parsing' && loadStatus.rowsTotal > 0
                ? `${Math.round(((loadStatus.fileIdx + loadStatus.rowsDone / loadStatus.rowsTotal) / loadStatus.total) * 100)}%`
                : `${Math.round(((loadStatus.done || 0) / loadStatus.total) * 100)}%`
            }} />
          </div>
          <div style={{fontSize:'0.72rem',color:'var(--text-muted)'}}>
            {loadStatus.phase === 'parsing'
              ? `${(loadStatus.rowsDone || 0).toLocaleString()} of ~${(loadStatus.rowsTotal || 0).toLocaleString()} rows · file ${(loadStatus.fileIdx || 0) + 1} of ${loadStatus.total}`
              : `${loadStatus.done || 0} of ${loadStatus.total} file${loadStatus.total > 1 ? 's' : ''} read`}
          </div>
        </div>
      )}

      {/* ── UPLOAD ZONE ── */}
      {!loadStatus && !hasFile && (
        <div
          className={`explorer-drop-zone fade-up ${dragOver ? 'drag-over' : ''}`}
          style={{marginBottom:'1.25rem'}}
          onDragOver={e => { e.preventDefault(); setDragOver(true); }}
          onDragLeave={() => setDragOver(false)}
          onDrop={e => { e.preventDefault(); setDragOver(false); handleFiles(e.dataTransfer.files); }}
          onClick={() => fileRef.current && fileRef.current.click()}
        >
          <div className="drop-icon">📂</div>
          <div className="drop-title">Load one or more data files to begin</div>
          <div className="drop-sub">CSV · TSV · TXT — select or drop multiple files to combine · delimiter auto-detected · stays local, nothing uploaded</div>
          <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" multiple style={{display:'none'}} onChange={e => handleFiles(e.target.files)} />
        </div>
      )}

      {/* ── FILE LOADED — computed stats ── */}
      {!loadStatus && hasFile && (
        <div className="fade-up">
          {/* file info bar */}
          <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom: fileData.fileNames && fileData.fileNames.length > 1 ? '0.4rem' : '0.85rem',flexWrap:'wrap'}}>
            <span style={{fontSize:'0.88rem',fontWeight:700,color:'var(--text-main)'}}>{fileData.fileName}</span>
            <span style={{fontSize:'0.78rem',color:'var(--text-muted)'}}>{fileData.rows.length.toLocaleString()} rows · {fileData.headers.length} columns · <span style={{color:'var(--primary)',fontWeight:600}}>{DELIM_LABELS[fileData.delim] || fileData.delim}-delimited</span></span>
            <button className="file-clear-btn" style={{marginLeft:'auto'}} onClick={() => onLoad(null, '')}>✕ Clear</button>
            <button className="sort-toggle-btn" onClick={() => fileRef.current && fileRef.current.click()}>📂 Replace / Add files</button>
            <input ref={fileRef} type="file" accept=".csv,.tsv,.txt" multiple style={{display:'none'}} onChange={e => handleFiles(e.target.files)} />
          </div>

          {/* multi-file list */}
          {fileData.fileNames && fileData.fileNames.length > 1 && (
            <div style={{display:'flex',gap:'0.4rem',flexWrap:'wrap',marginBottom:'0.85rem',alignItems:'center'}}>
              <span style={{fontSize:'0.68rem',fontWeight:700,color:'var(--text-muted)',textTransform:'uppercase',letterSpacing:'0.04em'}}>Files loaded:</span>
              {fileData.fileNames.map((n, i) => (
                <span key={i} style={{fontSize:'0.7rem',padding:'2px 8px',borderRadius:'20px',background:'var(--primary-faint)',color:'var(--primary)',fontFamily:'var(--font-mono)',fontWeight:500}}>{n}</span>
              ))}
            </div>
          )}

          {/* computed stat cards */}
          <div className="stats-row" style={{marginBottom:'1rem'}}>
            <div className="stat-card hero">
              <div className="stat-label">Overall Completeness</div>
              <div className="stat-value">{(dataStats.weightedPct * 100).toFixed(1)}%</div>
              <div className="stat-sub">Weighted across all {fileData.headers.length} columns</div>
            </div>
            <div className="stat-card">
              <div className="stat-label">Total Rows</div>
              <div className="stat-value">{fileData.rows.length.toLocaleString()}</div>
              <div className="stat-sub">{fileData.headers.length} columns profiled</div>
            </div>
            <div className="stat-card">
              <div className="stat-label" style={{color:'var(--success)'}}>Complete Cols</div>

            <div className="stat-card">

const COMPUTABLE_METRICS = [
  { id:'CM-1', name:'Employees',        icon:'👥', label:'Member / Employee ID col', type:'distinct',  hint:'e.g. MEMID, EE_ID, SUBSCRIBER_ID' },
  { id:'CM-2', name:'Patients',         icon:'🏥', label:'Patient ID col',           type:'distinct',  hint:'e.g. PTID, PATIENT_ID' },
  { id:'CM-3', name:'Claim Count',      icon:'📋', label:'Claim ID col',             type:'distinct',  hint:'e.g. CLAIM_NBR, CLM_ID' },
  { id:'CM-4', name:'Claimline Count',  icon:'📄', label:'Auto — total row count',   type:'rowcount',  hint:'No column needed' },
  { id:'CM-5', name:'Total Paid',       icon:'💰', label:'Paid amount col',          type:'sum',       hint:'e.g. PAID_AMT, AMOUNT_PAID', isCurrency:true },
  { id:'CM-6', name:'Scope Begin Date', icon:'📅', label:'Paid date col',            type:'min_date',  hint:'e.g. PAID_DT, PAYMENT_DATE' },
  { id:'CM-7', name:'Scope End Date',   icon:'📅', label:'Paid date col',            type:'max_date',  hint:'e.g. PAID_DT, PAYMENT_DATE' },
];

function autoDetect(headers, id) {
  const find = pats => headers.find(h => pats.some(p => p.test(h.toLowerCase()))) || '';
  switch (id) {
    case 'CM-1': return find([/mem.*id|ee_id|subscr.*id|member_id|empl.*id|employee_id/]);
    case 'CM-2': return find([/pt.*id|patient.*id|pat.*id/]);
    case 'CM-3': return find([/claim.*(?:id|no|num|nbr)|clm_id|claimid|claim_number/]);
    case 'CM-5': return find([/paid.*amt|amt.*paid|amount.*paid|paid_amount|paid_amnt/]);
    case 'CM-6':
    case 'CM-7': return find([/paid.*dt|dt.*paid|paid.*date|payment.*date|pay.*date/]);
    default: return '';
  }
}

function LiveMetrics({ fileData, mappings, setMappings }) {
  const { headers, rows, fileName } = fileData;

  // Auto-detect columns on new file load
  useEffect(() => {
    if (!headers.length) return;
    setMappings(prev => {
      const next = { ...prev };
      COMPUTABLE_METRICS.forEach(m => {
        if (m.type !== 'rowcount' && !next[m.id])
          next[m.id] = autoDetect(headers, m.id);
      });
      return next;
    });
  }, [headers]);

  const results = useMemo(() => {
    if (!rows.length) return {};
    const r = {};
    COMPUTABLE_METRICS.forEach(m => {
      const col = mappings[m.id] || '';
      if (m.type === 'rowcount') {
        r[m.id] = rows.length;
      } else if (!col) {
        r[m.id] = null;
      } else if (m.type === 'distinct') {
        const s = new Set();
        rows.forEach(row => { const v = String(row[col] ?? '').trim(); if (v) s.add(v); });
        r[m.id] = s.size;
      } else if (m.type === 'sum') {
        let total = 0;
        rows.forEach(row => {
          const n = parseFloat(String(row[col] ?? '').replace(/[$,\s]/g, ''));
          if (!isNaN(n)) total += n;
        });
        r[m.id] = total;
      } else if (m.type === 'min_date' || m.type === 'max_date') {
        let extreme = null;
        rows.forEach(row => {
          const v = String(row[col] ?? '').trim();
          if (!v) return;
          let d = new Date(v);
          // Try YYYYMMDD (no separators)
          if (isNaN(d) && /^\d{8}$/.test(v))
            d = new Date(`${v.slice(0,4)}-${v.slice(4,6)}-${v.slice(6,8)}`);
          // Try MM/DD/YYYY or M/D/YYYY
          if (isNaN(d) && /^\d{1,2}\/\d{1,2}\/\d{4}/.test(v)) {
            const [mo,dy,yr] = v.split('/');
            d = new Date(`${yr}-${mo.padStart(2,'0')}-${dy.padStart(2,'0')}`);
          }
          if (isNaN(d)) return;
          if (!extreme || (m.type === 'min_date' ? d < extreme : d > extreme)) extreme = d;
        });
        r[m.id] = extreme
          ? extreme.toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' })
          : null;
      }
    });
    return r;
  }, [rows, mappings]);

  const fmtVal = (m, val) => {
    if (val === null || val === undefined) return null;
    if (m.isCurrency) {
      const n = Number(val);
      if (Math.abs(n) >= 1e9) return '$' + (n/1e9).toFixed(3) + 'B';
      if (Math.abs(n) >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
      return '$' + n.toLocaleString('en-US', { minimumFractionDigits:2, maximumFractionDigits:2 });
    }
    if (typeof val === 'number') return val.toLocaleString('en-US');
    return String(val);
  };

  if (!headers.length) {
    return (
      <div style={{background:'var(--bg-card)',border:'1px solid var(--border-color)',borderRadius:'var(--radius-lg)',padding:'1.5rem',marginBottom:'1rem',textAlign:'center',boxShadow:'var(--shadow-xs)'}}>
        <div style={{fontSize:'1.5rem',marginBottom:'0.4rem'}}>📂</div>
        <div style={{fontWeight:700,color:'var(--text-muted)',marginBottom:'0.25rem'}}>No file loaded</div>
        <div style={{fontSize:'0.78rem',color:'var(--text-light)'}}>Go to the <strong>Overview</strong> tab to load a CSV, TSV, or TXT file — metrics will compute automatically.</div>
      </div>
    );
  }

  return (
    <div style={{background:'var(--bg-card)',border:'1px solid var(--border-color)',borderRadius:'var(--radius-lg)',padding:'1.1rem 1.25rem',marginBottom:'1rem',boxShadow:'var(--shadow-sm)'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1rem',flexWrap:'wrap',gap:'0.5rem'}}>
        <div>
          <span style={{fontSize:'0.95rem',fontWeight:700}}>Live Metric Results</span>
          <span style={{fontSize:'0.72rem',color:'var(--text-muted)',marginLeft:'0.75rem'}}>Computed from <strong>{fileName}</strong> · {rows.length.toLocaleString()} rows · select the matching column for each metric</span>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(195px,1fr))',gap:'0.75rem'}}>
        {COMPUTABLE_METRICS.map(m => {
          const raw  = results[m.id];
          const disp = fmtVal(m, raw);
          const has  = disp !== null;
          const col  = mappings[m.id] || '';
          return (
            <div key={m.id} style={{
              background: has ? 'var(--primary-faint)' : 'var(--bg-main)',
              border:`1px solid ${has ? 'rgba(119,37,108,0.2)' : 'var(--border-color)'}`,
              borderRadius:'var(--radius-md)', padding:'0.85rem 1rem',
              display:'flex', flexDirection:'column', gap:'0.35rem', transition:'border-color 0.2s'
            }}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span className="mono" style={{fontSize:'0.65rem',fontWeight:700,color:'var(--primary)',background:'var(--primary-faint)',padding:'2px 6px',borderRadius:'4px'}}>{m.id}</span>
                <span style={{fontSize:'1rem'}}>{m.icon}</span>
              </div>
              <div style={{fontSize:'0.8rem',fontWeight:700,color:'var(--text-main)'}}>{m.name}</div>
              {m.type === 'min_date' && <div style={{fontSize:'0.64rem',color:'var(--text-light)',fontStyle:'italic'}}>Earliest date in column</div>}
              {m.type === 'max_date' && <div style={{fontSize:'0.64rem',color:'var(--text-light)',fontStyle:'italic'}}>Latest date in column</div>}
              {m.type === 'rowcount' ? (
                <div style={{fontSize:'0.68rem',color:'var(--text-light)',fontStyle:'italic',minHeight:26,display:'flex',alignItems:'center'}}>Auto — counts all rows</div>
              ) : (
                <select className="filter-select" style={{fontSize:'0.72rem',padding:'3px 6px',width:'100%'}}
                  value={col} onChange={e => setMappings(p => ({ ...p, [m.id]: e.target.value }))}>
                  <option value="">— select column —</option>
                  {headers.map(h => <option key={h} value={h}>{h}</option>)}
                </select>
              )}
              <div style={{fontSize: has ? '1.45rem' : '1.1rem', fontWeight:800,
                color: has ? 'var(--primary)' : 'var(--text-light)', letterSpacing:'-0.02em', marginTop:'0.1rem'}}>
                {has ? disp : '—'}
              </div>
              {col && m.type !== 'rowcount' && (
                <div style={{fontSize:'0.65rem',color:'var(--text-light)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={col}>↳ {col}</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function FieldMapper({ fileData, fieldMappings, setFieldMappings }) {
  const { headers, rows } = fileData;
  const [search,      setSearch]      = useState('');
  const [draggedCol,  setDraggedCol]  = useState(null);
  const [dropTarget,  setDropTarget]  = useState(null);
  const [colFilter,   setColFilter]   = useState('all'); // all | mapped | unmapped
  const [selectedCol, setSelectedCol] = useState(null);

  const mappedSet    = useMemo(() => new Set(Object.values(fieldMappings).filter(Boolean)), [fieldMappings]);
  const mappedCount  = useMemo(() => Object.values(fieldMappings).filter(Boolean).length, [fieldMappings]);

  const filteredFields = useMemo(() => {
    let f = CI_FIELDS;
    if (search) { const s = search.toLowerCase(); f = f.filter(c => c.toLowerCase().includes(s)); }
    if (colFilter === 'mapped')   f = f.filter(c => fieldMappings[c]);
    if (colFilter === 'unmapped') f = f.filter(c => !fieldMappings[c]);
    return f;
  }, [search, colFilter, fieldMappings]);

  const visibleHeaders = useMemo(() => {
    if (!search) return headers;
    return headers; // always show all source cols
  }, [headers]);

  const [valFilter, setValFilter] = useState('');
  const [valSort,   setValSort]   = useState('count'); // 'count' | 'alpha'

  // Unique values for the selected column
  const colStats = useMemo(() => {
    if (!selectedCol || !rows.length) return null;
    let filled = 0;
    const counts = {};
    rows.forEach(r => {
      const v = (r[selectedCol] ?? '').toString().trim();
      if (v !== '') { filled++; counts[v] = (counts[v] || 0) + 1; }
      else { counts['(blank)'] = (counts['(blank)'] || 0) + 1; }
    });
    const entries = Object.entries(counts).map(([val, cnt]) => ({ val, cnt }));
    return { filled, empty: rows.length - filled, distinct: Object.keys(counts).filter(k => k !== '(blank)').length + (counts['(blank)'] ? 0 : 0), distinctAll: Object.keys(counts).length, entries };
  }, [selectedCol, rows]);

  const uniqueValues = useMemo(() => {
    if (!colStats) return [];
    let list = colStats.entries;
    if (valFilter) { const s = valFilter.toLowerCase(); list = list.filter(e => e.val.toLowerCase().includes(s)); }
    if (valSort === 'alpha') list = [...list].sort((a, b) => a.val.localeCompare(b.val));
    else list = [...list].sort((a, b) => b.cnt - a.cnt);
    return list;
  }, [colStats, valFilter, valSort]);

  const maxValCount = uniqueValues.length ? Math.max(...uniqueValues.map(e => e.cnt)) : 1;

  const exportCSV = () => {
    const rows = ['Client Field,Map,CI Field Name'];
    CI_FIELDS.forEach(ci => {
      const client = fieldMappings[ci] || '';

      rows.push(`"${client}","${map}","${ci}"`);

    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'Field_Mapping_Export.csv'; a.click();

function FieldReference() {
  const [search, setSearch] = useState('');

  const cats = useMemo(() => ['all', ...Array.from(new Set(FIELD_REFERENCE.map(f => f.cat)))], []);

    let r = [...FIELD_REFERENCE];
