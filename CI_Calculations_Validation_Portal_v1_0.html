      { key:'refA',  label:'Type of Bill col',  hint:'e.g. TOB, TYPE_OF_BILL' },
    ],
  },
  {
    id:'TC-5', name:'Type of Bill', icon:'📑',
    formula:'Count(Revenue Code)',
    formulaType:'single',
    cols:[
      { key:'field', label:'Type of Bill col',  hint:'e.g. TOB, TYPE_OF_BILL' },
      { key:'refA',  label:'Revenue Code col',  hint:'e.g. REV_CODE, REVENUE_CODE' },
    ],
  },
];

function countFilled(rows, col) {
  if (!col) return 0;
  return rows.filter(r => String(r[col] ?? '').trim() !== '').length;
}

function TargetCompletion({ fileData, mappings, setMappings }) {
  const { headers, rows, fileName } = fileData;

  const results = useMemo(() => {
    if (!rows.length) return {};
    return Object.fromEntries(TARGET_COMPLETION_METRICS.map(m => {
      const sel = mappings[m.id] || {};
      const fieldCol = sel.field || '';
      const refACol  = sel.refA  || '';
      const refBCol  = sel.refB  || '';
      if (!fieldCol || !refACol) return [m.id, null];
      const actual = countFilled(rows, fieldCol);
      const refA   = countFilled(rows, refACol);
      const refB   = m.formulaType === 'subtract' ? countFilled(rows, refBCol) : 0;
      const target = m.formulaType === 'subtract' ? refA - refB : refA;
      if (target <= 0) return [m.id, null];
      return [m.id, { actual, target }];
    }));
  }, [rows, mappings]);

  if (!headers.length) return null;

  const setSel = (id, key, val) =>
    setMappings(prev => ({ ...prev, [id]: { ...(prev[id] || {}), [key]: val } }));

  return (
    <div style={{background:'var(--bg-card)',border:'1px solid var(--border-color)',borderRadius:'var(--radius-lg)',padding:'1.1rem 1.25rem',boxShadow:'var(--shadow-sm)'}}>
      <div style={{marginBottom:'1rem'}}>
        <span style={{fontSize:'0.95rem',fontWeight:700}}>Target Completion Percentage</span>
        <span style={{fontSize:'0.72rem',color:'var(--text-muted)',marginLeft:'0.75rem'}}>Select the matching columns — results show the actual filled count vs. the formula target count</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(260px,1fr))',gap:'0.75rem'}}>
        {TARGET_COMPLETION_METRICS.map(m => {
          const res = results[m.id];
          const sel = mappings[m.id] || {};
          const sortedHeaders = [...headers].sort((a,b) => a.localeCompare(b));
          return (
            <div key={m.id} style={{
              background: res ? 'var(--primary-faint)' : 'var(--bg-main)',
              border:`1px solid ${res ? 'rgba(119,37,108,0.2)' : 'var(--border-color)'}`,
              borderRadius:'var(--radius-md)', padding:'0.85rem 1rem',
              display:'flex', flexDirection:'column', gap:'0.4rem', transition:'border-color 0.2s'
            }}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span className="mono" style={{fontSize:'0.65rem',fontWeight:700,color:'var(--primary)',background:'var(--primary-faint)',padding:'2px 6px',borderRadius:'4px'}}>{m.id}</span>
                <span style={{fontSize:'1rem'}}>{m.icon}</span>
              </div>
              <div style={{fontSize:'0.8rem',fontWeight:700,color:'var(--text-main)'}}>{m.name}</div>
              <div style={{fontSize:'0.65rem',color:'var(--text-light)',fontStyle:'italic',marginBottom:'0.1rem'}}>Target: {m.formula}</div>
              {m.cols.map(c => (
                <div key={c.key}>
                  <div style={{fontSize:'0.63rem',color:'var(--text-muted)',marginBottom:'2px'}}>{c.label}</div>
                  <select className="filter-select" style={{fontSize:'0.72rem',padding:'3px 6px',width:'100%'}}
                    value={sel[c.key] || ''}
                    onChange={e => setSel(m.id, c.key, e.target.value)}>
                    <option value="">— select column —</option>
                    {sortedHeaders.map(h => <option key={h} value={h}>{h}</option>)}
                  </select>
                </div>
              ))}
              {res ? (
                <div style={{marginTop:'0.4rem',display:'flex',flexDirection:'column',gap:'0.2rem'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                    <span style={{fontSize:'0.63rem',color:'var(--text-muted)'}}>Actual count</span>
                    <span style={{fontSize:'1.3rem',fontWeight:800,color:'var(--primary)',letterSpacing:'-0.02em'}}>{res.actual.toLocaleString()}</span>
                  </div>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline'}}>
                    <span style={{fontSize:'0.63rem',color:'var(--text-muted)'}}>Target count</span>
                    <span style={{fontSize:'1.3rem',fontWeight:800,color:'var(--text-main)',letterSpacing:'-0.02em'}}>{res.target.toLocaleString()}</span>
                  </div>
                </div>
              ) : (
                <div style={{fontSize:'1.1rem',fontWeight:800,color:'var(--text-light)',marginTop:'0.3rem'}}>—</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ============================================================
function FieldMapper({ fileData, fieldMappings, setFieldMappings }) {
  const { headers, rows } = fileData;
  const [search,      setSearch]      = useState('');
  const [draggedCol,  setDraggedCol]  = useState(null);
  const [dropTarget,  setDropTarget]  = useState(null);
  const [colFilter,   setColFilter]   = useState('all'); // all | mapped | unmapped
  const [selectedCol, setSelectedCol] = useState(null);

  const mappedSet    = useMemo(() => new Set(Object.values(fieldMappings).filter(Boolean)), [fieldMappings]);
  const mappedCount  = useMemo(() => Object.values(fieldMappings).filter(Boolean).length, [fieldMappings]);

  const requiredSet = useMemo(() => new Set(FIELD_MAPPING_DATA.filter(r => r.required).map(r => r.friendly)), []);

  const filteredFields = useMemo(() => {
    let f = CI_FIELDS;
    if (search) { const s = search.toLowerCase(); f = f.filter(c => c.toLowerCase().includes(s)); }
    if (colFilter === 'mapped')   f = f.filter(c => fieldMappings[c]);
    if (colFilter === 'unmapped') f = f.filter(c => !fieldMappings[c]);
    if (colFilter === 'required') f = f.filter(c => requiredSet.has(c));
    return [...f].sort((a, b) => a.localeCompare(b));
  }, [search, colFilter, fieldMappings, requiredSet]);

  const visibleHeaders = useMemo(() => {
    return [...headers].sort((a, b) => a.localeCompare(b));
  }, [headers]);

  const [valFilter, setValFilter] = useState('');
  const [valSort,   setValSort]   = useState('alpha'); // 'count' | 'alpha'

  // Unique values for the selected column
  const colStats = useMemo(() => {
    if (!selectedCol || !rows.length) return null;
    let filled = 0;
    const counts = {};
    rows.forEach(r => {
      const v = (r[selectedCol] ?? '').toString().trim();
      if (v !== '') { filled++; counts[v] = (counts[v] || 0) + 1; }
      else { counts['(blank)'] = (counts['(blank)'] || 0) + 1; }
    });
    const entries = Object.entries(counts).map(([val, cnt]) => ({ val, cnt }));
    return { filled, empty: rows.length - filled, distinct: Object.keys(counts).filter(k => k !== '(blank)').length + (counts['(blank)'] ? 0 : 0), distinctAll: Object.keys(counts).length, entries };
  }, [selectedCol, rows]);

  const uniqueValues = useMemo(() => {
    if (!colStats) return [];
    let list = colStats.entries;
    if (valFilter) { const s = valFilter.toLowerCase(); list = list.filter(e => e.val.toLowerCase().includes(s)); }
    if (valSort === 'alpha') list = [...list].sort((a, b) => a.val.localeCompare(b.val));
    else list = [...list].sort((a, b) => b.cnt - a.cnt);
    return list;
  }, [colStats, valFilter, valSort]);

  const maxValCount = uniqueValues.length ? Math.max(...uniqueValues.map(e => e.cnt)) : 1;

  const exportCSV = () => {
    const rows = ['Client Field,Map,CI Field Name'];
    CI_FIELDS.forEach(ci => {
      const client = fieldMappings[ci] || '';
      const map    = client ? '→' : '';
      rows.push(`"${client}","${map}","${ci}"`);
    });
    const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'Field_Mapping_Export.csv'; a.click();
  };

  const clearAll = () => setFieldMappings(Object.fromEntries(CI_FIELDS.map(f => [f, ''])));

  if (!headers.length) {
    return (
      <div style={{background:'var(--bg-card)',border:'1px solid var(--border-color)',borderRadius:'var(--radius-lg)',padding:'2rem',textAlign:'center',boxShadow:'var(--shadow-xs)'}}>
        <div style={{fontSize:'1.8rem',marginBottom:'0.5rem'}}>🗂️</div>
        <div style={{fontWeight:700,color:'var(--text-muted)',marginBottom:'0.25rem'}}>No file loaded</div>
        <div style={{fontSize:'0.78rem',color:'var(--text-light)'}}>Load a file on the <strong>Overview</strong> tab — your columns will appear here for mapping.</div>
      </div>
    );
  }

  return (
    <div>
      {/* Top bar */}
      <div style={{display:'flex',alignItems:'center',gap:'0.75rem',marginBottom:'0.85rem',flexWrap:'wrap'}}>
        <div className="mapper-stats">
          <span className="mapper-stat-pill total">{CI_FIELDS.length} CI Fields</span>
          <span className="mapper-stat-pill done">{mappedCount} Mapped</span>
          <span className="mapper-stat-pill pending">{CI_FIELDS.length - mappedCount} Unmapped</span>
        </div>
        <div style={{display:'flex',gap:'0.5rem',marginLeft:'auto',flexWrap:'wrap'}}>
          <button className="sort-toggle-btn" onClick={exportCSV}>⬇ Export CSV</button>
          <button className="file-clear-btn" onClick={clearAll}>✕ Clear all</button>
        </div>
      </div>

      <div className="mapper-wrap">
        {/* LEFT — source columns */}
        <div className="mapper-source">
          <div className="mapper-source-header">
            <div className="panel-title">
              Client Data Fields &nbsp;
              <span style={{fontWeight:400,color:'var(--text-light)'}}>{headers.length} total · {mappedSet.size} mapped</span>
            </div>
            <input className="explorer-col-search" placeholder="Filter columns…"
              onChange={e => {}} style={{width:'100%'}} />
          </div>
          <div style={{padding:'0.4rem 0.5rem',borderBottom:'1px solid var(--border-color)',display:'flex',gap:'4px',flexWrap:'wrap',background:'var(--bg-main)'}}>
            <span style={{fontSize:'0.65rem',color:'var(--text-light)',alignSelf:'center',marginRight:2}}>🟢 mapped &nbsp; ⚪ unmapped</span>
          </div>
          <div className="mapper-col-list">
            {visibleHeaders.map(col => (
              <div
                key={col}
                draggable
                onDragStart={() => setDraggedCol(col)}
                onDragEnd={() => setDraggedCol(null)}
                onClick={() => setSelectedCol(col === selectedCol ? null : col)}
                className={`mapper-col-chip ${mappedSet.has(col) ? 'mapped' : ''} ${draggedCol === col ? 'dragging' : ''} ${selectedCol === col ? 'selected' : ''}`}
                title="Click to preview unique values · Drag onto a CI field to map"
              >
                <div className="chip-dot" />
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{col}</span>

  const rows = useMemo(() => {
    let r = FIELD_MAPPING_DATA;
    if (showFilter === 'mapped')   r = r.filter(row => fieldMappings[row.friendly]);

// ============================================================
// CSV PARSER (handles quoted fields)
// ============================================================
function detectDelimiter(firstLine) {
  const candidates = [',', '\t', '|', ';'];
  let best = ',', bestCount = 0;
  candidates.forEach(d => {
    const count = firstLine.split(d).length - 1;
    if (count > bestCount) { bestCount = count; best = d; }
  });
  return best;
}

function parseCSVLine(line, delim) {
  // Fast path — no quotes present (covers nearly all pipe/tab/semicolon files)
  if (line.indexOf('"') === -1) {
    return line.split(delim).map(v => v.trim());
  }
  // Slow path — handle quoted fields
  const result = [];
  let current = '', inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQuotes = !inQuotes; }
    else if (c === delim && !inQuotes) { result.push(current.trim()); current = ''; }
    else { current += c; }
  }
  result.push(current.trim());
  return result;
}

function parseCSV(text) {
  const rawLines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
  const lines = rawLines.filter(l => l.trim().length > 0);
  if (lines.length < 2) return { headers: [], rows: [], delim: ',' };
  const delim = detectDelimiter(lines[0]);
  const headers = parseCSVLine(lines[0], delim).map(h => h.replace(/^"|"$/g, '').trim());
  const hLen = headers.length;
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = parseCSVLine(lines[i], delim);
    const row = {};
    for (let j = 0; j < hLen; j++) {
      const v = vals[j];
      row[headers[j]] = v ? v.replace(/^"|"$/g, '').trim() : '';
    }
    rows.push(row);
  }
  return { headers, rows, delim };
}

// Async chunked parser — yields to the browser every CHUNK rows so large files
// don't freeze/kill the script. onProgress(rowsDone, rowsTotal), onDone(parsed|null).
function parseCSVChunked(text, onProgress, onDone) {
  try {
    if (!text || typeof text !== 'string') { onDone(null); return; }
    const CHUNK = 5000;
    // Normalise line endings then split — more reliable than regex split
    const raw = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const lines = raw.split('\n');
    // find first non-blank line
    let start = 0;
    while (start < lines.length && !lines[start].trim()) start++;
    if (start >= lines.length) { onDone(null); return; }
    const delim = detectDelimiter(lines[start]);
    const headers = parseCSVLine(lines[start], delim).map(h => h.replace(/^"|"$/g, '').trim()).filter(Boolean);
    if (!headers.length) { onDone(null); return; }
    const hLen = headers.length;
    const total = lines.length;
    const rows = [];
    let i = start + 1;
    function step() {
      try {
        const end = Math.min(i + CHUNK, total);
        for (; i < end; i++) {
          const line = lines[i];
          if (!line || !line.trim()) continue;
          const vals = parseCSVLine(line, delim);
          const row = {};
          for (let j = 0; j < hLen; j++) {
            const v = vals[j];
            row[headers[j]] = v ? v.replace(/^"|"$/g, '').trim() : '';
          }
          rows.push(row);
        }
        onProgress(rows.length, Math.max(total - start - 1, 1));
        if (i < total) { setTimeout(step, 0); }
        else { onDone({ headers, rows, delim }); }
      } catch(e) {
        console.error('parseCSVChunked step error:', e);
        onDone(rows.length ? { headers, rows, delim } : null);
      }
    }
    setTimeout(step, 0);
  } catch(e) {
    console.error('parseCSVChunked init error:', e);
    onDone(null);
  }
}

        </div>
